factorian_ancient_runes_knowledge=[color=purple]异星工厂古代符文[/color]知识
ancient_runes_rules=每个符文[img=item/wdm_rune_1]对应恰好1个古代药水碑[img=wdm_rune_chemical_1]。一个碑有3种药水属性——红、绿、蓝。它们可以是正或负。当两个符文在祭坛上组合时，匹配的属性会增强，对应的药水会显示在房间中央。这是一个符文的“大药水部分”与另一个符文的“小药水部分”比较的结果，两者必须颜色和符号相同。如果两个碑没有匹配的属性，它们会相互中和，产生一个中性药水[img=wdm_rune_potion_gui_N]。当你得到一个药水结果，你可以进行推理以帮助解开谜题。例如：当两个符文比较显示一个蓝色正药水[img=wdm_rune_potion_gui_BP]时，你可以推断这些符文没有蓝色负符号，因此你可以从碑列表中排除相应的可能性。\n要证明你对古代符文的知识，3个随机的古代药水碑会显示在3个祭坛上。你有有限的时间为每个祭坛添加正确的符文。计时结束时，如果所有3个符文都与对应的碑正确匹配，谜题即被解开，你将学会掌握跃迁机器，解锁[technology=wdm_ship_win]。
rune_mystery_solved=耶！！恭喜你！你已经解开了[color=purple]异星工厂古代符文之谜[/color]。现在你拥有了掌握跃迁机器所需的知识，并已解锁[technology=wdm_ship_win]。
rune_mystery_wrong=不！！出错了！[color=purple]异星工厂古代守护者[/color]现在将惩罚你！

