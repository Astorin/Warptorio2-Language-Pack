
drg_intro_message=Wasza załoga zbliżała się do zniszczonej planety [img=drg_planet]Fracta Mantis C — rozbitej planety, którą Deep Core Operations uznało za bogatą w cenne zasoby do wydobycia kosmicznego. Podczas wchodzenia na orbitę platforma kosmiczna zderzyła się z jednym z ogromnych fragmentów planety. Uszkodzenia były krytyczne. [item=thruster]Utracono silniki odrzutowe, a duże fragmenty konstrukcji uległy zniszczeniu. Twoja załoga jest teraz uwięziona w małej komorze ładunkowej, odcięta od kluczowych systemów statku. Większość platformy leży w ruinach. \n Jedyne, co nadal działa, to mały terminal. Dzięki niemu odkrywasz, że nadal możesz sterować zewnętrznymi ramionami mechanicznymi statku. Być może, obsługując je, uda ci się zebrać niezbędne zasoby z orbity i rozpocząć naprawę najbardziej krytycznych uszkodzeń — na tyle, by odbudować funkcjonalną sterownię. Uszkodzony, ale nienaruszony kanał transferowy nadal łączy zewnętrzną część statku z twoim przedziałem, umożliwiając transport materiałów do środka i na zewnątrz. Naciśnij [img=drg_elevator], aby uzyskać dostęp do platformy zewnętrznej i przejąć kontrolę nad ramionami mechanicznymi.

