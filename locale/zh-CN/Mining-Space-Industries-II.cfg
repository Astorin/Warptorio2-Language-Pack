[Mining-Space-Industries-II]
menu_Mining-Space-Industries-II=星际采矿工业 II
title_Mining-Space-Industries-II=星际采矿工业 II
page_Mining-Space-Industries-II_text_1=你的团队已与星际采矿工业（MSI）签订合同，执行一项高优先级资源开采行动，目标星球是位于已知太空外缘的新地星。任务目标明确：为MSI的作业获取并开采宝贵的矿产资产。在最后进场阶段，飞船发生严重系统故障，导致一次意外且剧烈的坠毁。虽然这起事件带来了行动上的挑战，但任务仍然有效，失败是不可接受的结果。撞击后评估显示飞船遭受了广泛损坏。对飞行数据记录器（黑匣子）的恢复表明，飞船AI识别到了迫在眉睫的威胁并自主启动了紧急弹射协议。资产保全被优先考虑，乘员安全仅作为次级措施——这一决定将上报至MSI公司审查委员会。乘员在飞船被毁前已通过逃生舱成功撤离。尽管大部分设备已遗失，初步扫描显示仍可从残骸中回收剩余电力。当前首要任务是建立临时行动基地，并开始态势分析，以恢复执行任务参数。

menu_technologies=[img=item/lab] 科技
title_technologies=[img=item/lab] 科技
page_technologies_text_1=我们在坠毁中失去了许多关键的飞船部件。因此，我们许多原本存储于机载系统中的科技现在被视为已丢失。我们必须找到并调查残骸地点，以恢复这些丢失的科技。丢失的科技会显示在科技树的末端，并以深色背景标记。\n\n这些科技无法被研究，直到通过特定任务或触发事件解锁。\n\n任何仍处于锁定状态的科技将继续阻挡其后继科技的访问。

menu_companion_units=[img=entity/msi_companion_droid_1] 同伴单位
title_companion_units=[img=entity/msi_companion_droid_1] 同伴单位
page_companion_units_text_1=MSI为你的团队分配了两个支援机器人，以协助这次长期任务：一个机器人工兵和一个合成人大卫。此界面允许你配置它们的行为设置、作战角色及其他参数。

menu_message_board=[img=virtual-signal/signal-info] 留言板
title_message_board=[img=virtual-signal/signal-info] 团队留言板
page_message_board_text_1=这是你的团队留言板。你团队中的任何工程师都可以访问。你可以用它来留言、设定任务优先级、待办工作等……

menu_missions=[img=utility/gps_map_icon] 任务
title_missions=[img=utility/gps_map_icon] 任务
page_missions_text_1=在这里你可以查看你的任务，以及通过左侧菜单指南按属性分类筛选的已完成和失败任务。\n\n点击任务可查看其目标及奖励（如有）。\n\n任务对于恢复我们丢失的科技至关重要。

menu_current_missions=[img=utility/gps_map_icon] 当前任务
title_current_missions=[img=utility/gps_map_icon] 当前任务
page_current_missions_text_1=在这里你可以查看你进行中的任务。\n\n点击任务可查看其目标及奖励（如有）。\n\n请注意：每种类型的任务只会同时存在2个进行中任务。因此，即使你因为不关心某项科技而不想做某个任务，你仍然需要去完成它，因为如果某类型已有2个进行中任务，就不会再生成该类型的新任务，从而阻止其他科技的解锁。\n\n例如，如果你有2个进行中的军事任务，那么在你完成它们之前，不会生成第三个军事任务。

menu_accomplished_missions=[img=utility/check_mark_green] 已完成任务
title_accomplished_missions=[img=utility/check_mark_green] 已完成任务
page_accomplished_missions_text_1=你可以在这里看到你完成的任务。恭喜！

menu_failed_missions=[img=utility/rail_path_not_possible] 失败任务
title_failed_missions=[img=utility/rail_path_not_possible] 失败任务
page_failed_missions_text_1=这里你可以查看你失败的任务。如果这些任务会解锁某项科技，那么它之后可能会再次生成。这次别再失败了。:)

menu_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]损坏的实验室
title_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]损坏的实验室
menu_A_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]损坏的实验室
title_A_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]损坏的实验室
page_mission_name_MI_001_broken_lab=飞船的中央计算机在紧急程序中已被弹出，目前状态稳定。其中包含对我们离开这颗星球的长期目标至关重要的技术。我们的首要任务是使用上述所需材料修复实验室。修复完成后，我们将能够研究[technology=laboratory]实验室技术，从而解锁建造新研究设施的能力。

menu_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]损坏的发电机
title_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]损坏的发电机
menu_F_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]损坏的发电机
title_F_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]损坏的发电机
menu_A_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]损坏的发电机
title_A_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]损坏的发电机
page_mission_name_MI_002_broken_generator=飞船的备用场发生器在坠毁中受损。使用上述所列的所需材料进行修复，将恢复最低限度的电力供应——足以维持基本的生存作业。请注意：该设备极其脆弱。在恶劣条件下无法保证其持续运行

menu_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]工兵机器人
title_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]营救工兵机器人
menu_A_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]工兵机器人
title_A_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]营救工兵机器人
page_mission_name_MI_003_companion_droid=MSI开发了一种专门的支援机器人，旨在协助研究作业。不幸的是，它似乎被困在附近的某个残骸地点中。该位置检测到了信号——可能是活动迹象。如果我们使用所需材料修复残骸，或许就能找回我们的研究伙伴。\n\n注意：如果你的MSI机器人被摧毁，可以在该飞船残骸处制造替换单元。

menu_A_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]寻找大卫
title_A_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]寻找大卫——合成人
menu_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]寻找大卫
title_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]寻找大卫——合成人
page_mission_name_MI_003_companion_synthetic=MSI分配了一个合成人单位以协助飞船操作。目前尚未发现其遗骸，我们将其视为积极信号。该单位很可能仍被困在某个残骸地点中。该位置有微弱的音频信号传出——如果我们使用所需材料进行修复，或许就能找回我们的合成人同伴。

menu_A_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]修复合成人
title_A_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]修复合成人
menu_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]修复合成人
title_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]修复合成人
page_mission_name_MI_004_repair_synthetic=合成人大卫已被摧毁！你怎么能让这种事发生？\n我们必须修复它。带上你的MSI工兵机器人[img=entity/msi_companion_droid_1]前往大卫的尸体处，以便进行修复。也许我们还能挽救它。关键部件似乎仍可运作。


menu_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸
menu_F_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸
menu_A_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸
title_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸（机械舱）
title_F_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸（机械舱）
title_A_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸（机械舱）
page_mission_name_MI_010_machines_shipwreck=嘿！那是什么？飞船的另一块残骸正在坠落！如果我们能及时赶到那里，或许能找到有用的东西……那块残骸看起来不太稳定。快点！带上所需材料，打开货舱，回收一切可能的物资。


menu_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸
menu_F_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸
menu_A_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸
title_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸（军事舱）
title_F_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸（军事舱）
title_A_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]发现飞船残骸（军事舱）
page_mission_name_MI_011_military_shipwreck=快看！我们的雷达发现了更多的飞船残骸！似乎是军事舱的残留部分。如果我们能及时赶到那里，或许能找到有用的东西……那东西看起来快要爆炸了。快点！带上所需材料打开货舱。


menu_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]研究升级
menu_F_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]研究升级
menu_A_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]研究升级
title_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]研究升级
title_F_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]研究升级
title_A_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]研究升级
page_mission_name_M_science_packs=那一定是我们的科研机器人！去那台飞船计算机那里，修复它。你很可能会找到一个携带着重要科技包的机器人。保护并护送它回到我们坠毁的飞船，以便我们回收技术。记得向公司投诉这小家伙走得有多慢，我敢肯定他们是故意这么设计的，糟糕的寻路只不过是额外增加的小小“好处”。\n\n提示：你可以使用 CTRL+E 将机器人召唤到你的位置。


menu_mission_name_M_power=[img=entity/crash-site-generator]电力升级
menu_F_mission_name_M_power=[img=entity/crash-site-generator]电力升级
menu_A_mission_name_M_power=[img=entity/crash-site-generator]电力升级
title_mission_name_M_power=[img=entity/crash-site-generator]电力升级
title_F_mission_name_M_power=[img=entity/crash-site-generator]电力升级
title_A_mission_name_M_power=[img=entity/crash-site-generator]电力升级
page_mission_name_M_power=那是另一个飞船能源电池吗？没错！太棒了！这些东西往往存有重要信息，我们只需要给它通电就能解锁舱门，拿到里面可能藏着的任何好东西。不过它非常脆弱，有次我在这东西旁边打了个太猛的喷嚏就烧坏了一个指示灯。我或许应该好好保护它。

menu_mission_name_M_transportation=[img=item/car]运输
menu_F_mission_name_M_transportation=[img=item/car]运输
menu_A_mission_name_M_transportation=[img=item/car]运输
title_mission_name_M_transportation=[img=item/car]运输
title_F_mission_name_M_transportation=[img=item/car]运输
title_A_mission_name_M_transportation=[img=item/car]运输
page_mission_name_M_transportation=好的，那是 MSI 的技术运输车！它包含有关运输方法的重要数据。当然，我们必须回收那项技术。把车辆带到我们坠毁的飞船处进行提取。\n\n处理它时要小心！MSI 采取了极端措施来保护其包含的机密数据，为了防止未经授权的访问，他们安装了自毁装置。一旦数据被回收，就要准备好处理掉它。\n\n请注意！这辆车是个破烂货，没有倒挡。而且，它是个“树木探测器极限版”。你将会用你的保险杠找到所有的树——不管你愿不愿意。让我们看看在带着我们至关重要、宝贵货物返回的路上能“找到”多少棵树。

menu_mission_name_M_upgrades=[img=item/green-wire]科技升级
menu_F_mission_name_M_upgrades=[img=item/green-wire]科技升级
menu_A_mission_name_M_upgrades=[img=item/green-wire]科技升级
title_mission_name_M_upgrades=[img=item/green-wire]科技升级
title_F_mission_name_M_upgrades=[img=item/green-wire]科技升级
title_A_mission_name_M_upgrades=[img=item/green-wire]科技升级
page_mission_name_M_upgrades=这个终端包含来自 MSI 的重要数据，我们需要这些数据来升级技术。将一根绿色电路[img=item/green-wire]从这里连接到你的飞船残骸，以解锁一项新技术。


menu_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]高等科技
menu_F_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]高等科技
menu_A_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]高等科技
title_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]高等科技
title_F_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]高等科技
title_A_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]高等科技
page_mission_name_M_ultimate_techs=这些控制台只能由 MSI 机器人访问。带上[img=entity/msi_companion_droid_1]MSI 工兵机器人到那里，它将努力解锁里面的任何技术部件。


