title_mission_name_M_research_msi_protomolecule_antidote_bomb=[img=technology/msi_protomolecule_antidote_bomb]研究解毒剂炸弹
title_A_mission_name_M_research_msi_protomolecule_antidote_bomb=[img=technology/msi_protomolecule_antidote_bomb]研究解毒剂炸弹
page_mission_name_M_research_msi_protomolecule_antidote_bomb=我们成功杀死了那个巨大的原体分子感染巢穴！这是个好消息。坏消息是感染在其周围扩散得太快，现在这东西无处不在！我们需要研究对抗感染的方法。因此，让我们集中精力开发一种生物武器，以彻底清除这一威胁。如果我们能通过炸弹将其释放到大气中，就能一次性打击所有感染。我们需要研究原体分子解毒剂炸弹[img=item/msi_protomolecule_antidote_bomb]，并用火箭发射它！

menu_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]发射解毒剂炸弹
