[technology-description]
msi_companion_droid_tech=Ta technologia pozwala ulepszyć droida towarzyszącego MSI. Może on pomóc w wydobywaniu surowców, naprawach, budowie i produkcji naukowej. Każdy poziom dodaje punkty zdrowia, odporności i inne umiejętności.
msi_companion_synthetic_tech=Ta technologia pozwala ulepszyć Davida, syntetycznego towarzysza. Każdy poziom dodaje więcej HP, odporności, obrażeń i innych umiejętności związanych z bronią. David jest wojownikiem i może pomóc na placu budowy silosu rakietowego.
msi_protomolecule_scan=Ta technologia pozwoli naszym satelitom wykrywać obecność tajemniczej protomolekuły, dzięki czemu będziemy mogli rozpocząć analizę właściwości tej nieznanej cząsteczki.
msi_protomolecule_awaken=Pomoże nam to zrozumieć, co stało się z Davidem i czym jest ta próbka cząsteczki, dzięki czemu będziemy wiedzieć, jak poradzić sobie z tym zagrożeniem.
msi_rocket_delivery_requests=Twoja drużyna została zatrudniona przez MSI (Mining Space Industries) w jednym celu: wydobycie bogactw mineralnych z tej planety! Oczywiście musisz dostarczyć każdy z tych ciężkich ładunków rakietą. Zbadaj tę technologię, aby dowiedzieć się, czego MSI oczekuje w dostawach.
msi_protomolecule_antidote_bomb=Ta broń biologiczna jest wystarczająco skuteczna, aby zniszczyć wszystkie infekcje protomolekułą na planecie. Bomba musi zostać wystrzelona do atmosfery z silosu rakietowego.

