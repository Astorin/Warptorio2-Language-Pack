[mod-setting-description]
warptorio_pollution_exponent=数值越高，随着工厂增长污染扩散越快。默认 0.225。公式：污染 += 污染 ^ X。
warptorio_pollution_multiplier=污染增长结果的乘数。数值越低越温和，越高越严厉。默认 0.75。
warptorio_pollution_tickrate=污染增长公式每 X 秒执行一次。默认 3。
warptorio_solar_multiplier=地下平台楼层上太阳能板的效率乘数。0 = 无效，0.5 = 半功率（默认），1 = 全日照。
warptorio_warpchance=通过下拉菜单设定跃迁目标时，此百分比决定你实际降落在该星球的概率（否则为随机）。默认 30%。
warptorio_votewarp_multi=0 = 任何一名玩家均可发动跃迁。0.51（默认）= 简单多数。1 = 全体一致。中间值表示需要在线玩家中的相应比例。
warptorio_lootchest_chance=数值越高越稀有。50 = 常见，150（默认）= 标准，1000 = 极为稀有。
warptorio_lootchest_distance=战利品箱不会在距离平台少于该数值的地块内生成。默认 196。
warptorio_biter_expansion=数值越高，虫巢随时间扩张越快。默认 1.009（温和）。最大值 2 = 激进。
warptorio_biter_min=虫群可扩张的最小间隔时间下限。默认 5 分钟。
warptorio_biter_max=初始扩张计时器；通过扩张速率设置加速。默认 15 分钟。
warptorio_biter_redux=在整个游戏过程中，扩张计时器最多可减少的量。默认 1 分钟。
warptorio_biter_wavemin=难度设定：最低强度虫族进攻几率（每秒 1/X 几率）。X 数值越小，攻击触发越频繁。该概率会随时间逐渐趋近于波次最小值。默认值 700（ = 每秒 1/700 为最高攻击频率上限）。
warptorio_biter_wavemax=难度设定：最高强度虫族进攻几率（每秒 1/X 几率）。X 数值越大，概率越低。该概率会随时间逐渐趋近于波次最小值。默认值：7000。
warptorio_biter_waverng=虫群进攻波次几率随时间增加至 `wavemin` 的速度，单位：每分钟。数值越高，进攻波次越快变强。默认 10。
warptorio_biter_wavesize=在每颗星球上，进攻波次的虫群规模每分钟增加此数量的虫子。默认 1（缓慢增长），设为 5 可快速升级。
warptorio_biter_wavesizemax=难度设定：虫族进攻数量的最大值，以虫子数量计。0 = 无限制。默认 500。
warptorio_biter_wavestart=跃迁后、首次进攻波次出现之前的空闲时间。默认 5 分钟。
warptorio_autowarp_time=自动跃迁触发的基础时间。每级跃迁反应堆研究增加 10 分钟。默认 20。
warptorio_warpcharge_max=跃迁充能时间的硬上限。默认 15 分钟。
warptorio_warpcharge_zone=达到此跃迁区域数时，线性“更多区域 = 更长充能”曲线达到上限。默认 70。
warptorio_warpcharge_zonegain=区域进度组件可增加的最大额外充能时间。默认 8 分钟。
warptorio_warpcharge_multi=每个跃迁区域额外增加的固定秒数。默认 0.5。
warptorio_warp_charge_factor=平台越大，充能越慢。平台上每有 X 个实体，充能时间 +1 分钟。默认 70。
warptorio_ability_warp=跃迁后，反应堆能力（稳定器、加速器、扫描仪）可使用的冷却时间。默认 2 分钟。
warptorio_ability_cooldown=能力使用之间的基础冷却时间。默认 5 分钟。
warptorio_ability_timegain=每次使用能力，下一次冷却时间增加此数值的分钟数。默认 2.5。防止滥发。
warptorio_ability_drain=能力激活时，每 tick（60 tick = 1 秒）消耗平台能量的此比例。默认 0.00001 ≈ 每秒 0.06%。
warptorio_carebear=在游戏开始时投放一个箱子，内含石头、板材、齿轮、枪、弹药和基础部件。适合新玩家或新手开局。
warptorio_water=在游戏开始时自动研究锅炉层水科技，使你立即在锅炉层拥有水。
warptorio_peaceful_weight=应用于和平模板（标记为“休息”类型——海洋、荒芜、丛林）随机权重的乘数。1.0 = 默认。0.0 = 和平星球永不出现。2.0 = 和平星球出现频率加倍。范围 0.0-2.0。
warptorio_resource_weight=应用于资源模板（标记为“资源”类型——铁、铜、煤、石、油、铀、富矿）随机权重的乘数。1.0 = 默认。0.0 = 资源星球永不出现。2.0 = 资源星球出现频率加倍。范围 0.0-2.0。
warptorio_aggressive_weight=应用于侵略模板（标记为“侵略”类型——多虫巢等）随机权重的乘数。1.0 = 默认。0.0 = 侵略星球永不出现。2.0 = 侵略星球出现频率加倍。范围 0.0-2.0。

