drg_drop_pod_hack_mission=看起来这艘来自竞争对手的空降舱坠毁并被遗弃在这里。可以通过黑客入侵获取宝贵的数据和资源。使用绿色电路电缆将其连接到[entity=drg_hacking_terminal]以开始入侵过程。
drg_hacking_terminal=此终端允许你在黑客入侵任务期间入侵敌对系统。为其充能，并使用绿色电路电缆将终端与目标空降舱连接起来。
drg_broken_lab=修复这件遗物，放入所需材料以恢复其中的内容。
drg_mule_broken=看起来你的骡子被摧毁了。点击显示修复面板。
drg_rescue_mule_broken=这是一台损坏的老式骡子。点击显示修复面板。
