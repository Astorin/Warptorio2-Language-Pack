drg_class_scout_tooltip=Разведчик отличается исключительной манёвренностью: у него есть значительный бонус к скорости передвижения, что позволяет ему с лёгкостью перемещаться по пещерам. Он превосходно справляется с быстрой сменой позиций и ведением скоростного боя с использованием лёгкого оружия, такого как пистолет-пулемёт и сигнальный пистолет. Однако у него нет начального бонуса к здоровью, а скорость добычи ресурсов и крафта у него стандартная. Для выживания он полагается скорее на скорость, чем на физическую выносливость.
drg_class_heavy_tooltip=Боец - это опора передовой линии, обладающая максимальным начальным запасом здоровья и дополнительными ячейками в инвентаре для боеприпасов. Хотя из-за массивной брони и тяжёлого вооружения (такого как Пулемёт Гатлинга и Ручная пушка) он изначально испытывает заметные ограничения в скорости передвижения и добыче ресурсов, со временем он превращается в неудержимую силу. Он способен поддерживать несколько энергетических щитов, что делает его единственным классом, способным выдерживать прямые попадания дредноутов.
drg_class_engineer_tooltip=Инженер - мастер технологий корабля Space Rig. Он отличается самой высокой скоростью крафта и наиболее эффективным развертыванием турелей (с минимальной задержкой). Хотя его физические характеристики скромны, его полезность не имеет себе равных: он единственный, кто имеет право использовать такие передовые технологии, как Сейсмический заряд и Тесла-пушка. Он способен за считанные секунды превратить любую позицию в крепость.
drg_class_miner_tooltip=Шахтёр - специалист по бурению, обладающий огромным 60-процентным бонусом к начальной скорости добычи. Он создан для работы с окружающей средой, имеет расширенный инвентарь и прочные экзоскелеты. Вооружённый средствами для блокирования доступа, такими как Огнемёт и Ядовитые капсулы, он с одинаковой эффективностью расчищает путь и уничтожает вредителей. Он является опорой любой добывающей операции.

