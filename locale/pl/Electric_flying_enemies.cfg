[entity-description]
fe_resonance_shard=Stworzony przez starożytną cywilizację, artefakt ten został zaprojektowany jako ostatnia linia obrony przed nieustępliwym naporem autonomicznych maszyn wojennych.\nJego skomplikowana architektura przekierowuje nieznane wzorce energetyczne, które zakłócają koordynację wrogiej SI, uniemożliwiając im zakładanie nowych baz w zasięgu działania artefaktu.

