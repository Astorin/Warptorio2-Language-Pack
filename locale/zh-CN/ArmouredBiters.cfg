[mod-setting-description]
ab-small-armoured-biter-health=改变最大生命值（100%为默认值，百分比越高敌人越强）
ab-small-armoured-biter-resistances=改变抗性，100%为默认值，百分比越高敌人越强
ab-small-armoured-biter-spawn-probability=改变生成概率（100%表示硬壳虫与普通虫子的生成几率相同，百分比越高则硬壳虫比普通虫子更可能出现）
ab-medium-armoured-biter-health=改变最大生命值（100%为默认值，百分比越高敌人越强）
ab-medium-armoured-biter-resistances=改变抗性，100%为默认值，百分比越高敌人越强
ab-medium-armoured-biter-spawn-probability=改变生成概率（100%表示硬壳虫与普通虫子的生成几率相同，百分比越高则硬壳虫比普通虫子更可能出现）
ab-big-armoured-biter-health=改变最大生命值（100%为默认值，百分比越高敌人越强）
ab-big-armoured-biter-resistances=改变抗性，100%为默认值，百分比越高敌人越强
ab-big-armoured-biter-spawn-probability=改变生成概率（100%表示硬壳虫与普通虫子的生成几率相同，百分比越高则硬壳虫比普通虫子更可能出现）
ab-behemoth-armoured-biter-health=改变最大生命值（100%为默认值，百分比越高敌人越强）
ab-behemoth-armoured-biter-resistances=改变抗性，100%为默认值，百分比越高敌人越强
ab-behemoth-armoured-biter-spawn-probability=改变生成概率（100%表示硬壳虫与普通虫子的生成几率相同，百分比越高则硬壳虫比普通虫子更可能出现）
ab-leviathan-armoured-biter-health=改变最大生命值（100%为默认值，百分比越高敌人越强）
ab-leviathan-armoured-biter-resistances=改变抗性，100%为默认值，百分比越高敌人越强
ab-leviathan-armoured-biter-spawn-probability=默认50%
ab-enable-nest=若启用，硬壳虫将从它们自己的巢穴类型中生成，而不是从虫巢中生成（与Rampant不兼容）
ab-enable-moisture-check=若启用，将仅在潮湿区域生成硬壳虫巢穴（与Rampant不兼容）

