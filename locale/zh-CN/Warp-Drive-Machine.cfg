learn_about_ancient_runes_tt=打开古代符文测试室，在那里你可以比较两个不同的符文，并揭示它们之间共同的符号。[color=red]确保你至少有两个不同的符文！[/color]\n
prove_rune_knowledge=证明[color=purple]符文[/color]知识
prove_rune_knowledge_tt=你将有有限的时间在测试室中证明你对[color=purple]异星工厂古代符文[/color]的了解。在3个祭坛上插入正确的符文以显示对应的符号。确保你拥有8种类型符文各至少一个，因为你可能需要任意一种！\n
prove_rune_knowledge_tt2=[color=red][font=default-bold][img=utility/warning_icon]任何人在古代测试室中犯错都将受到严厉惩罚！[/font][/color]
