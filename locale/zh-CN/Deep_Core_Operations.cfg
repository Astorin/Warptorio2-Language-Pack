
drg_intro_message=你的船员们正在接近[img=drg_planet]Fracta Mantis C——一个由深核行动公司鉴定为富含太空采矿所需宝贵资源的破碎星球。在进入轨道时，太空钻井平台与星球上的一块巨大碎片相撞。损伤十分严重。[img=item/thruster]推进器丢失，结构的大部分被毁。你的船员们现在被困在一个小货舱内，与船上的重要系统隔绝。钻井平台的大部分已成废墟。\n唯一还能运作的是一个小型终端。通过它，你发现你仍然可以控制船上的外部机械臂。或许，通过操作它们，你可以从轨道上收集到必要的资源，并开始修复最关键的损伤——足以重建一个可正常运作的控制室。一条受损但完好的传输管道仍然连接着外部和你的货舱，允许材料进出。按下[img=drg_elevator]即可进入外部平台并控制机械臂。
drg_intro_message_2=太棒了 那些武器真的很有帮助！通过修复[img=entity/drg_space_rig_terminal]终端，你现在可以远程连接到其他受损和被阻塞的区域，并使用所需材料进行修复。进入并修复这些区域应该是你的首要任务！\n终端现在也与外部平台共享电源。
drg_intro_message_3=我们的[entity=drg_mule_droid_1]骡子安然无恙地待在那里！太棒了！看来采矿作业毕竟还在继续。\n管理层每次将太空钻井平台送入深空轨道时，都会搭载一个完全可操作的骡子单元。这些机器是每次采矿探险的中坚力量——运输矿物、运送补给，并在地下一切事物都想要矿工性命时保护他们。失去一台骡子就会使整个作业陷入瘫痪。在恢复受损储藏室的电力后，骡子终于对终端握手做出了回应。它的系统陈旧、破败，还被这里发生的一切所覆盖的灰尘所覆盖……但它仍然能工作。这就是我们所需要的。随着骡子重新上线，你现在可以更高效地在钻井平台上运输资源，并为大规模行星开采做准备。
drg_intro_message_4=[entity=drg_mission_terminal]任务终端已重新上线！干得好。现在通信已恢复，钻井平台可以再次与行星扫描仪和深核导航卫星建立同步连接。系统中已出现新的采矿作业，地表下的洞穴正在实时绘制中。更重要的是……[img=entity/drg_drop_pod]空投舱发射舱已重新投入使用。这意味着我们终于可以将采矿机直接部署到地下洞穴网络中，那里有最丰富的矿脉。\n不过，请注意——自动扫描显示地壳深处存在异常生物活动。洞穴已久未被打扰，无论洞穴深处有什么生物，它们都有足够的时间扩散。尽管如此，管理层想要那些矿物，现在我们终于有了获取它们的手段。\n任务网络已上线。空投舱已加满油。洞穴正静待开采。岩石与矿石，采矿机！

