drg_mission_rare_minerals_tooltip=Wydobądź rzadkie i cenne minerały.
drg_mission_mining_tooltip2=Tylko minerały zebrane przez muła liczą się do ukończenia misji. Automatycznie zbiera rudy z pobliskich skrzyń. Po udanym wydobyciu wszystkie zebrane rudy są przenoszone do wewnętrznego magazynu platformy kosmicznej.
drg_mission_killing_tooltip2=Przekop się przez jaskinię, aby zlokalizować głównego wroga. Po znalezieniu go wyeliminuj go, aby ukończyć misję.
drg_mission_pest_control_tooltip=Zniszcz wrogie siedliska obcych.
drg_mission_pest_control_tooltip2=Zabij określoną liczbę jednostek wroga, wieżyczek lub generatorów.

drg_mission_scan_cave_tooltip2=Zbuduj radary w 3 wyznaczonych lokalizacjach i utrzymuj je w stanie gotowości. Każdy radar musi wykonać 10 skanów.
drg_mission_rescue_mule_tooltip2=Przeszukaj jaskinię w poszukiwaniu 4 zagubionych jednostek typu Muł. Napraw je i eskortuj z powrotem do kapsuły ewakuacyjnej w celu ewakuacji.
drg_mission_hacking_tooltip2=Konkurencyjna firma porzuciła kapsułę ewakuacyjną po nieudanej misji. Podłącz ją do rozstawionego terminala hakerskiego za pomocą zielonych kabli, aby ją zhakować i zabezpieczyć cenne dane oraz zasoby znajdujące się w środku.
drg_mission_mine_liquid_tooltip2=Znajdź i napraw 3 ekstraktory płynów w jaskini. Po uruchomieniu zaczną one pompować cenny płyn. Zbuduj rury, aby podłączyć je do wyrzutni ładunku płynnego, zapakuj płyn do beczek i załaduj wyrzutnię. Będziesz potrzebować [img=item/barrel]beczek. Wystrzel ładunek, aby ukończyć misję.
drg_mission_rare_minerals_tooltip2=Złoża rzadkich minerałów są rozrzucone po całej jaskini. Kop, aby zlokalizować błyszczące skały i wydobądź je za pomocą kilofa. Pamiętaj, że tylko minerały zebrane przez Muła liczą się do ukończenia misji, więc umieść je w pobliskich skrzyniach dla Muła.
