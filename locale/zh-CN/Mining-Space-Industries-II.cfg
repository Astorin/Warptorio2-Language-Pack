[technology-description]
msi_companion_droid_tech=此技术允许你升级 MSI 工兵机器人。它可以协助你采矿、修理、建造和生产科技包。每升一级增加生命值、抗性及其他能力。
msi_companion_synthetic_tech=此技术允许你升级合成人同伴大卫。每升一级增加更多生命值、抗性、伤害和其他武器能力。大卫是一名战士，并可在火箭发射井建造工地提供帮助。
msi_protomolecule_scan=此技术将使我们的卫星能够探测到神秘原体分子的存在，从而开始分析这种未知物质的特性。
msi_protomolecule_awaken=这将帮助我们理解大卫遭遇了什么，以及这个分子样本是什么，从而知道如何应对那个威胁。
msi_rocket_delivery_requests=你的团队受雇于 MSI（星际采矿工业），任务是从这颗星球上开采丰富的矿产资源！当然，你必须用火箭运送每一件重型货物。研究此技术以揭示 MSI 期望运送的货物。
