[technology-description]
drg_molly_upgrade=Ulepsz Muła, aby uzyskać większą odporność, HP, miejsce w ekwipunku i wyposażenie. Każdy poziom zwiększa również premię za zebrane rudy o 3%.
drg_energy_receiver=Umożliwia odbiór energii z platformy kosmicznej. Liczba jednoczesnych połączeń zasilających jest ograniczona przez ulepszenia badawcze.
drg_energy_receiver_extra_links=Zwiększa liczbę jednoczesnych łączy przesyłających energię.
drg_tech_toxic_mask=Umożliwia budowę maski przeciwgazowej, która chroni użytkownika przed toksycznymi gazami. Niezbędny sprzęt do przetrwania w toksycznych jaskiniach [space-location=drg-biome-toxic]Żył Toxfract oraz [space-location=drg-biome-gleba]Klastra Żył Verdant.
drg_tech_license_lightning_rod=Pozwala na budowę piorunochronów
drg_tech_unlock_biome_gleba=Odblokowuje [space-location=drg-biome-gleba]Klaster Żył Verdant do eksploracji.
drg_tech_unlock_biome_aquilo=Odblokowuje [space-location=drg-biome-aquilo]Krystaliczne Kanały do eksploracji.

drg_supply_capsule=Pozwala załodze pod ziemią wezwać kapsułę z zaopatrzeniem, która zrzuci zapasy z platformy kosmicznej. Każdy poziom technologii podstawowej zwiększa liczbę wezwań na misję.
drg_platform_linked_chest_2=Pozwala na zbudowanie kolejnej skrzyni połączonej z platformą w celu przenoszenia przedmiotów między platformą zewnętrzną a wnętrzem platformy kosmicznej
drg_ship_fluid_storage=Pozwala statkowi na przechowywanie płynów w zbiorniku. Każdy poziom technologii zwiększa pojemność przechowywania płynów o 50 tys. litrów.
drg_Mule_upgrade=Ulepszenie dla Muła. Każdy poziom zwiększa jego HP, pojemność magazynową i siatkę wyposażenia.
drg_ship_resource_storage=Dodaje więcej miejsca na platformie kosmicznej do przechowywania zasobów. Każdy poziom technologii zwiększa pojemność.
drg_mule_fluid_collect=Pozwala Mułowi na zbieranie płynów przechowywanych w [entity=drg_mule_fluid_collector]. Jeśli ekstrakcja się powiedzie, płyny są przechowywane wewnętrznie na platformie kosmicznej.

drg_drill_cannon=Przenośne działo wiertnicze zaprojektowane do pracy w nieprzyjaznych środowiskach podziemnych. Po wyposażeniu w nie wystrzeliwuje ładunki uderzeniowe z obrotowymi końcówkami wiertniczymi, zdolnymi do szybkiego rozbijania skał i otwierania przejść w głębokich jaskiniach. Niezbędne dla inżynierów, którzy muszą posuwać się naprzód pod presją i unikać uwięzienia.
drg_ship_floors_tech=Odblokowuje nowe piętro statku kosmicznego, dostępne za pomocą windy.

drg_ship_platform_camera=Umiejętność statku kosmicznego: umożliwia aktywację kamery platformowej, dzięki czemu można zobaczyć, co się dzieje na zewnątrz.
wdm-linked-chest=Umożliwia przenoszenie przedmiotów między piętrami statku kosmicznego
drg_ship_pipe=Umożliwia transfer płynów między piętrami platformy kosmicznej za pomocą połączonych rur. Każdy poziom zwiększa liczbę rur, które można umieścić na jednym piętrze

drg_enemy_evolution_tracker=Pozwala statkowi śledzić ewolucję wrogów. Jest to wyświetlane na panelu informacji o planecie, dzięki czemu możesz obserwować, jak wrogowie ewoluują na każdej planecie
drg_contract_tasks=Umożliwia przyjmowanie zleceń od Gwiezdnej Kompanii Górniczej
drg_tech_mule_containment_chamber=Miejsce dla Muła
drg_tech_mission_terminal=Odblokowuje platformę zrzutową i terminal misji w platformie kosmicznej, umożliwiając przyjmowanie misji i zrzucanie się do jaskiń.
drg_tech_heat_shield=Umożliwia podróżowanie do regionów o ekstremalnie wysokich temperaturach na planecie

