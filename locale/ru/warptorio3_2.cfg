[mod-setting-description]
warptorio_pollution_exponent=Больше = загрязнение растёт быстрее по мере роста вашего завода. По умолчанию 0.225. Формула: загрязнение += загрязнение ^ X.
warptorio_pollution_multiplier=Множитель результата роста загрязнения. Меньше = легче, выше = жёстче. По умолчанию 0.75.
warptorio_pollution_tickrate=Формула роста загрязнения запускается каждые X секунд. По умолчанию 3.
warptorio_solar_multiplier=Множитель эффективности солнечных панелей, расположенных на подземных этажах, 0 = бесполезны, 0.5 = половина мощности (по умолчанию), 1 = полный солнечный свет.
warptorio_warpchance=Когда вы устанавливаете цель варпа через выпадающее меню, этот % вероятности решит, удастся ли вам попасть туда (иначе случайно). По умолчанию 30%.
warptorio_votewarp_multi=0 = любой игрок может запустить варп. 0.51 (по умолчанию) = простое большинство. 1 = единогласно. Всё, что между = соотношение подключённых игроков.
warptorio_lootchest_chance=Большое число = реже. 50 = обычно, 150 (по умолчанию) = стандарт, 1000 = очень редко.
warptorio_lootchest_distance=Трофейные сундуки не появятся ближе к вашей платформе, чем это количество клеток. По умолчанию 196.
warptorio_biter_expansion=Больше = базы кусак расширяются быстрее. По умолчанию 1.009 (умеренно). Максимум 2 = агрессивно.
warptorio_biter_min=Жёсткое ограничение, как часто кусаки могут расширяться. По умолчанию 5 минут.
warptorio_biter_max=Время до первой экспансии; можно ускорить через настройку скорости экспансии. По умолчанию 15 минут.
warptorio_biter_redux=Насколько таймер экспансии может быть уменьшен в течение игры. По умолчанию 1 минута.
warptorio_biter_wavemin=Нижняя граница шанса (1 к X в секунду). Меньше Х = БОЛЕЕ частые атаки. Шанс волны снижается по отношению к нижней границе с течением времени. 700 по умолчанию (= 1-к-700-в-секунду - максимальный уровень атак).
warptorio_biter_wavemax=Первоначальная вероятность (1 к X в секунду) сразу после варпа. Больше X = реже. Уменьшается в сторону 'wavemin' со временем. По умолчанию 7000.
warptorio_biter_waverng=Насколько быстро шанс волны стремится вверх в сторону 'волны' в минуту. Больше = волны становятся чаще. По умолчанию 10.
warptorio_biter_wavesize=Количество кусак в волне растёт на это количество кусак в минуту на планете. По умолчанию 1 (медленное масштабирование), установите 5 для быстрой эскалации.
warptorio_biter_wavesizemax=Верхний предел количества кусак в волне. 0 = без ограничения. По умолчанию 500.
warptorio_biter_wavestart=Спокойное время после варпа перед появлением любых волн. По умолчанию 5 минут.
warptorio_autowarp_time=Базовое время до запуска авто-варпа. Каждый уровень исследования варп-реактора добавляет 10 минут. По умолчанию 20.
warptorio_warpcharge_max=Верхний предел времени зарядки варпа. По умолчанию 15 минут.
warptorio_warpcharge_zone=Начиная с этой варп-зоны линейная кривая "больше зон = дольше зарядка" упирается в ограничение. По умолчанию 70.
warptorio_warpcharge_zonegain=Максимальное дополнительное время зарядки по мере прогресса зон. По умолчанию 8 минут.
warptorio_warpcharge_multi=Дополнительные секунды за каждую зону варпа. По умолчанию 0.5.
warptorio_warp_charge_factor=Большие платформы требуют больше времени для зарядки. Каждые X объектов платформе = +1 минута зарядки. По умолчанию 70.
warptorio_ability_warp=Время ожидания до восстановления способностей реактора (Стабилизатор, Ускоритель, Сканер) после варпа. По умолчанию 2 минуты.
warptorio_ability_cooldown=Базовая перезарядка между использованием способностей. По умолчанию 5 минут.
warptorio_ability_timegain=Каждое использование способности добавляет это количество минут к следующей перезарядке. По умолчанию 2.5. Предотвращает спам использования.
warptorio_ability_drain=Пока способность активна, она высасывает эту долю энергии платформы каждый тик (60 тиков = 1 секунда). По умолчанию 0.00001 ≈ 0,06% в секунду.
warptorio_carebear=Размещает сундук в игре с камнями, плитами, шестернями, пушками, боеприпасами и базовыми элементами завода. Для новичков в игре.
warptorio_water=Автоматически исследует технологию воды на этаже бойлерной в начале игры, так что вы сразу получите воду на этаже бойлерной.
warptorio_peaceful_weight=Множитель, применяемый к мирным шаблонам (отмеченные "rest" — океан, пустошь, джунгли). 1.0 = по умолчанию. 0.0 = мирные планеты никогда не появляются. 2.0 = мирные планеты встречаются в два раза чаще. Диапазон 0.0 - 2.0.
warptorio_resource_weight=Множитель, применяемый к ресурсно-фокусированным шаблонам (отмеченные как "resource" — железо, медь, уголь, камень, нефть, уран, богатая). 1.0 = по умолчанию. 0.0 = ресурсные планеты никогда не появляются. 2.0 = ресурсные планеты встречаются в два раза чаще. Диапазон 0.0 - 2.0.
warptorio_aggressive_weight=Множитель, применяемый к агрессивным шаблонам (отмеченные кака "aggressive" — планета кусак и подобными). 1.0 = по умолчанию. 0.0 = агрессивные планеты никогда не появляются. 2.0 = агрессивные планеты встречаются в два раза чаще. Диапазон 0.0 - 2.0.

