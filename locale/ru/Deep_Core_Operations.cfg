[space-location-description]
drg-biome-nauvis=Центральная горнодобывающая зона и основной операционный центр. Относительно стабильный подземный регион с развитой инфраструктурой и путями доступа к более глубоким пластам. На окраинах обитает типичная враждебная фауна. Хотя здесь нет какого-либо доминирующего ресурса, все редкие минералы можно найти в крайне низких концентрациях.
drg-biome-desert=Разломанные сухие каверны, в которых преобладают хрупкие породы и глубокие трещины. Рельеф нестабилен: во время раскопок часто возникают пыльные завалы и обрушения потолков. Под поверхностью скрываются местные паукообразные хищники, нападающие из потайных туннелей. В скалах иногда можно обнаружить залежи осколков перлита, а также более редкие следы амбериума.
drg-biome-vulcanus=Нестабильная сеть туннелей, нагреваемых магмой, где окружающую среду формируют сильная жара и давление. Реки расплавленной породы освещают пещеры, а сейсмическая активность здесь очень частая. В этих глубинах обитают взрывающиеся кусаки, набрасывающиеся на вторгшихся с сокрушительной силой. Глубоко в самых жарких зонах залегают богатые жилы ферронокса.
drg-biome-gleba=Эти пещеры заросли густой подземной растительностью, образовав плотную корневую систему и богатые минералами органические слои. Видимость ограничена из-за густой растительности, а рельеф может смещаться под давлением. Территорию охраняют пятиноги-топтуны — территориальные и чрезвычайно выносливые существа. Этот биом является основным источником амбериума, образующегося в органико-минеральной матрице.
drg-biome-aquilo=Замёрзшие туннели, прорубленные сквозь плотный лед и кристаллические образования. Свет преломляется в кристаллических стенах, движение замедлено из-за сильного холода. По этим проходам бродят морозные кусаки, способные замораживать цели и механизмы. В слоях льда часто встречаются крупные залежи осколков перлита.
drg-biome-fulgora=Заряженные электричеством пещеры, где в окружающем пространстве постоянно пробегают дуги разрядов. Воздух гудит от статического электричества, а в работе техники часто возникают помехи. Эти зоны патрулируют древние автономные дроиды — пережитки утраченной цивилизации, отличающиеся высокой прочностью и точностью. Нестабильные энергетические поля приводят к образованию отложений спайкита, потрескивающего от накопленного заряда.
drg-biome-toxic=Корродированные и токсичные системы туннелей, заполненные скоплениями плотного газа и реактивными минералами. Видимость низкая, длительное пребывание здесь опасно. Здесь обитают токсичные кусаки, которые во время боя выделяют ядовитые облака. Основным ресурсом является радиантит — летучий минерал, излучающий вредную энергию и загрязняющий окружающую среду.


