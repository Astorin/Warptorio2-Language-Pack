wpe_elevator=启用飞船电梯面板。提高飞船楼层之间的移动能力。
wpe_ship_energy=启用飞船能量信息面板，在此查看飞船上存储的电力。
wpe_harvester_recaller=启用跃迁收割机远程召回功能。通过飞船面板操作。
