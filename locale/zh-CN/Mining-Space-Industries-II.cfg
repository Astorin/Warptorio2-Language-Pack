page_mission_name_M_unique_msi_dorment_protomolecule=它就在那里！它不可能永远躲着我们！我们的卫星已经探测到了神秘原体分子的存在。是时候开始分析那种未知物质的特性了。让我们带着合成人大卫，去我们刚刚发现的那件文物那里进行更深入的检查。

menu_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]研究原体分子
menu_A_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]研究原体分子
title_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]研究原体分子样本
title_A_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]研究原体分子样本
page_mission_name_M_research_msi_protomolecule_awaken=我靠！以异星工厂的名义，刚才发生了什么？大卫被那东西吸收了吗？到底怎么回事？攻击我们的那些东西是什么？它们看起来像大卫！它正在被复制吗？发生了什么？\n\n小心，那东西看起来不稳定。我们应该试着把大卫从那里面解救出来……\n\n我们需要了解发生了什么。如果我们能在实验室里研究[technology=msi_protomolecule_awaken]这个分子样本，也许就能找到应对这种威胁的方法。

