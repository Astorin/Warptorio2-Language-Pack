drg_mission_scan_cave_tooltip2=在3个指定位置建造雷达并保持运行。每个雷达需要完成10次扫描。
drg_mission_drill_tooltip2=钻探机需要[item=coal]才能运行。当你的物品栏中有煤炭并处于钻探机工作范围内时，它会向晶簇水晶移动。一旦抵达目标，持续为其供能以钻穿水晶，直到水晶被摧毁，任务完成。注意：玩家不能挖掘到钻机前面。随其前进，靠近并清理路径。
drg_mission_rescue_mule_tooltip2=在洞穴中搜寻4个丢失的骡子单元。修理它们，并护送它们返回空降舱进行撤离。
drg_mission_hacking_tooltip2=一家敌对公司在任务失败后遗弃了一个空降舱。使用绿色电路电缆将其连接到部署的黑客终端，通过黑客入侵获取其中宝贵的数据和资源。
drg_mission_mine_liquid_tooltip2=在洞穴中找到并修理3台流体提取器。激活后，它们将开始抽取有价值的流体。建造管道将它们连接到流体载荷发射器，将流体装桶，然后装入发射器。你需要[img=item/barrel]桶。发射载荷以完成任务。
drg_mission_rare_minerals_tooltip2=稀有矿物矿床散布在洞穴各处。挖掘寻找闪亮的岩石，用镐子开采。请记住，只有骡子收集的矿物才算入任务完成进度，因此请将它们放入附近的箱子中供骡子收集。
drg_mission_deep_core_mining_tooltip2=定位并修复深埋于洞穴中的废弃大型深核提取器。使用[img=item/engine-unit]发动机单元、[img=item/advanced-circuit]高级电路板和[img=item/iron-gear-wheel]齿轮使机器重新上线。
drg_mission_train_fuel_delivery_tooltip=修建铁路为深核提取器运送燃料。
drg_mission_train_fuel_delivery_tooltip2=深核提取器需要燃料才能运行。你需要修建铁路并在危险的洞穴中运输[fluid=drg_fluid_gasola]汽油。让钻探机重新运转起来！提取器和火车之间存在某种神秘联系，因此只有当火车靠近时机器才能工作。
drg_mission_car_power_delivery_tooltip=修理一辆汽车，将其开到能量水晶处充能，然后开到火箭发射井为火箭充能。
drg_mission_car_power_delivery_tooltip2=一家敌对公司在洞穴系统深处遗弃了一个火箭发射井。情报显示里面仍然包含有价值的加密数据——我们打算偷走它。他们的安全系统由从附近的[img=entity/drg_crystal_blue]水晶中提取的神秘能量源供能。为了运输这种能量，他们开发了一种专用的能量载具，可以直接从水晶充电。找到损坏的载具，修理它，开到[img=entity/drg_crystal_blue]水晶处为其核心充电，然后将储存的能量运送到火箭发射井以解锁数据库。
drg_mission_platform_core_tooltip=取回一件独特遗物以升级太空钻机
drg_mission_platform_core_tooltip2=深入洞穴系统，找到失落的核心组装前哨。守住该地点并将所需资源喂入那台古老的机器。作为回报，它将锻造出一件能够扩展太空钻机能力并解锁新技术的独特遗物。
