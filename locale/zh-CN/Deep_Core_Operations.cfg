drg_mission_mining_tooltip2=只有骡子收集的矿物才算入任务完成进度。它会自动从附近的箱子中收集矿石。
drg_mission_killing_tooltip2=挖掘洞穴以找到主要敌人。找到后，消灭它即可完成任务。
drg_mission_pest_control_tooltip=摧毁敌人的母虫巢穴。
drg_mission_pest_control_tooltip2=击杀指定数量的敌方单位、建筑或生成器。
