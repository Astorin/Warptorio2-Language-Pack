page_mission_name_M_unique_msi_protomolecule_spawner_boss=我们杀死它了吗？杀了吗？没有吗？哦不！看起来那东西刚刚发射升空了！它跑到别处去了。看！它在那儿。但现在看起来大多了。我们必须不惜一切代价摧毁它！再来一次！开战！！

