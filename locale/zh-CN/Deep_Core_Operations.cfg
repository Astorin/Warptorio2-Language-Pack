drg_class_scout_tooltip=侦察兵异常敏捷，初始便拥有显著移动速度加成，能够轻松穿越洞穴。他擅长快速转移位置，并使用冲锋枪和信号枪等轻武器进行高速战斗。然而，他初始生命值并无加成，采矿和制作速度也属于标准水平。他依靠速度而非单纯的耐久力来生存。
drg_class_heavy_tooltip=重装机兵是前线的中坚力量，拥有最高的初始生命值和额外的弹药库存槽。虽然由于装备了厚重的装甲和重型武器（如迷你枪和手炮），他在开始时会有明显的移动和采矿惩罚，但他会逐渐成长为一股不可阻挡的力量。他能够维持多个能量护盾，使他成为唯一能够承受无畏舰直接攻击的职业。
drg_class_engineer_tooltip=工程师是太空钻机技术的主宰者。他拥有最快的制造速度和最高效的炮塔部署（延迟最低）。尽管他的物理属性并不出众，但他的实用性无与伦比，他是唯一获准使用地震弹和特斯拉枪等先进技术的人。他能在几秒钟内将任何位置变成堡垒。
drg_class_miner_tooltip=矿工是强力钻探专家，初始采矿速度有高达60%的加成。他专为环境操控而打造，拥有额外的背包容量和重型外骨骼。他配备了火焰喷射器和毒胶囊等区域压制工具，能高效地清理道路和害虫。他是任何开采行动的中坚力量。

