[space-location-description]
drg-biome-nauvis=破碎地星：中央采矿区和主要作业枢纽。一个相对稳定的地下区域，拥有成熟的基础设施和通往更深层的通道。标准敌对生物栖息在边缘地带。虽然没有特定的资源占主导地位，但所有稀有矿物都可能在这里以极低浓度被发现。
drg-biome-desert=裂幕深渊：破碎的干燥洞穴，以脆弱的岩石和深裂缝为主。地形不稳定，挖掘时常出现尘袋和坍塌顶壁。本土的蛛形掠食者潜伏在地表之下，从隐藏的隧道中发动袭击。偶尔可在岩石中发现暴露的珠光矿碎片，以及更稀有的琥珀块痕迹。
drg-biome-vulcanus=焚核隧道：一个由岩浆加热形成的易变网络隧道，高温高压塑造了环境。熔岩河流照亮洞穴，地震活动频繁。爆炸性撕咬者栖息在这些深处，以毁灭性的力量冲向入侵者。在最高温的区域深处埋藏着丰富的铁氧矿矿脉。
drg-biome-gleba=翠绿脉簇：茂密的地下植被覆盖了这些洞穴，形成厚实的根系系统和富含矿物的有机层。过度生长的植被降低了能见度，地形在压力下可能发生变化。该区域由五足兽和巨足兽守护，它们领地意识极强且生命力顽强。该生物群系是琥珀块的主要来源，形成于有机-矿物基质中。
drg-biome-aquilo=晶渠通道：由密实的冰层和水晶构造中开凿出的冰冻隧道。光线在水晶壁中折射，但极寒减缓了移动速度。寒霜撕咬者游荡在这些通道中，能够冻结目标和机器。在冰层中通常可发现大量珠光矿碎片沉积。
drg-biome-fulgora=电弧风暴洞窟：充满电荷的洞穴，持续的放电能量在环境中形成电弧。空气中静电嗡嗡作响，机械设备常受干扰。这些区域有古老的自主机器人巡逻，它们是失落文明的残骸，具有极高的抗性和精度。不稳定的能量场催生了尖刺矿的沉积，矿石中噼啪作响地储存着电荷。
drg-biome-toxic=毒裂矿脉：腐蚀且有毒素的隧道系统，充满了浓密的气囊和活性矿物。能见度低，长期暴露有危险。剧毒撕咬者在此繁衍生息，战斗中会释放有毒云雾。主要资源是辐射矿碎片，一种释放有害能量并污染周边区域的不稳定矿物。


