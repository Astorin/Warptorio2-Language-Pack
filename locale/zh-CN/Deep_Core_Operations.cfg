[technology-description]
drg_laboratory_productivity=提高实验室产能
drg_platform_core_upgrade=升级太空钻机主核心，扩展太空钻机的能力并解锁新技术。
drg_miner_drill_equipment=手动钻机允许矿工以更快的速度挖掘洞穴。消耗1[item=rocket-fuel]
drg_tech_beer_market=解锁酒吧，让你能够在任务结束后享受银河系中最好的酒。
drg_flare_gun=信号枪可照亮洞穴，被照亮的敌人在受到攻击时承受的伤害提高10%。
drg_emergency_extraction=允许你在紧急情况下呼叫撤离舱。然而，这项保险服务并非免费——紧急撤离必须在部署前通过任务终端雇佣。
drg_fluid_mining=在需要时允许使用流体来开采矿物
drg_freeze_chest=减缓腐烂速度
drg_seismic_charge=一种重型炸弹，造成范围伤害并炸出坑洞！
drg_molly_upgrade=升级骡子，提高其抗性、生命值、物品栏和装备槽。每级还会使收集矿石的加成提高10%。
drg_clanker=你的洞穴战斗伙伴！每级增加其生命值、抗性、伤害和攻击速度。
drg_energy_receiver=允许从太空钻机平台接收电力。同时可用的电力传输系统数量受科技升级限制。
drg_energy_receiver_extra_links=增加同时可用的电力传输系统数量。
drg_tech_toxic_mask=允许建造防毒面具，保护佩戴者免受有毒气体伤害。这是在[img=space-location/drg-biome-toxic]毒裂矿脉和[img=space-location/drg-biome-gleba]翠绿脉簇的有毒洞穴中生存的必备装备。
drg_tech_license_lightning_rod=允许建造避雷针
drg_tech_unlock_biome_gleba=解锁[img=space-location/drg-biome-gleba]翠绿脉簇以供探索。
drg_tech_unlock_biome_aquilo=解锁[img=space-location/drg-biome-aquilo]晶渠通道以供探索。

drg_supply_capsule=允许地下队员呼叫补给舱，从太空钻机空投物资。每级核心科技等级增加每次任务的呼叫次数。
drg_platform_linked_chest_2=允许建造另一个平台连接箱，在外部平台与太空钻机内部之间传输物品
drg_ship_fluid_storage=允许飞船储存流体储罐。每级科技等级增加50K流体储存容量。
drg_Mule_upgrade=骡子升级。每级提高其生命值、储存容量和装备网格。
drg_ship_resource_storage=在太空钻机上增加更多空间以储存资源。每级科技等级增加容量。
drg_mule_fluid_collect=允许骡子收集储存在[entity=drg_mule_fluid_collector]中的流体。如果成功撤离，流体会被储存在太空钻机内部。
drg_orbital_fluid_uplink=此机器允许通过传输系统将流体（[fluid=water][fluid=crude-oil][fluid=heavy-oil][fluid=ammoniacal-solution][fluid=lithium-brine][fluid=fluorine]）从洞穴泵送至太空钻机。为了建立持续流动，需从洞穴中向机器填充所需流体。一旦完全填满，将其留在洞穴中。如果任务成功完成并成功撤离，只要机器仍在该区域（生物群系）内，它就会继续向太空钻机泵送流体。安装传输系统需要在该行星区域中此前已完成过“开采液体”任务。每个洞穴任务只允许一台机器。

drg_drill_cannon=一种便携式钻探炮，专为恶劣的地下环境设计。装备后，可发射带有旋转钻头的冲击弹药，能够快速击碎岩石并在深洞中开辟通道。对于必须在压力下前进并避免被困的工程师来说至关重要。
drg_ship_floors_tech=解锁新的飞船楼层，可通过电梯进入。

drg_ship_platform_camera=飞船能力：启用平台摄像头，让你看到外面发生的事情。
wdm-linked-chest=允许在飞船楼层之间传输物品
drg_ship_pipe=允许使用连接管道在太空钻机楼层之间传输流体。每级增加每层可放置的管道数量。

drg_enemy_evolution_tracker=允许追踪敌人进化。显示在任务控制面板上，让你可以关注该区域敌人的进化情况。
