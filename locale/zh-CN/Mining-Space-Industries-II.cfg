title_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]发射解毒剂炸弹
title_A_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]发射解毒剂炸弹
page_mission_name_M_unique_launch_protomolecule_antidote_bomb=是时候将原体分子从这颗星球上清除出去了！我们必须将原体分子解毒剂炸弹释放到大气中。我们开发的这种生物武器将摧毁这颗星球上所有的原体分子活动。\n\n在火箭发射井中发射炸弹[img=item/msi_protomolecule_antidote_bomb]！


