home_planet_deleted=注意！__1__ 不再是你的母星了！它将很快被删除！离开前记得带走所有东西。
wdm_win_title=光荣胜利！你已击败海盗母舰！
wdm_win_text=恭喜你，工程师！\n\n尽管困难重重，你已完成了跨越星空的非凡旅程。\n\n你从一台损坏的跃迁引擎开始，被困在一艘失控跳跃于各个星球之间的飞船上。每次着陆都带来新的危险——充满凶猛生物的敌对世界、有毒的大气，以及常常连最基本的生存资源都极度匮乏。\n\n你忍受了孤立、混乱和压倒性的威胁。每次跃迁，你都打捞、重建和适应。你一块一块地恢复了飞船的功能——将一艘注定坠毁的残骸变成了一个强大的移动基地。\n\n最后，你面对了最终的挑战：一场与海盗头目及其巨型母舰的高潮之战。在引擎轰鸣和炮火交加中，你坚守阵地，为掌握自己的未来而战。\n然而，凭借策略、决心和纯粹的韧性……\n\n你赢了。\n\n海盗威胁已不复存在。群星属于你。
wdm_intro_message=这是一台跃迁引擎。你的发明——一艘配备跃迁引擎的飞船——已变成一场灾难性的失败。它坏了，不稳定，比起在太空中安全航行，它更擅长激怒行星上的生物。更糟的是，如果不加以控制，它的不稳定性可能直接摧毁它所在的星球。作为最后的安全措施，引擎会自动跳跃到随机星球以避免完全毁灭。\n你的任务：在这场无尽的跃迁循环混乱中生存下来，重建飞船，重新获得完全控制。只有这样，你才能准备好面对等待着的真正敌人。
wdm_artifact_research_trigger_description=[color=purple]在飞船终端插入飞船遗物：[/color] __1__
