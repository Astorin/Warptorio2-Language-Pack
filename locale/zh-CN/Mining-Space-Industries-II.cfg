page_mission_name_M_space_rockets=MSI 给你的时间表很紧，他们需要特定的资源，以确保他们不会认为你已经变成了一个消耗过的资产。所以我们需要将下面列出的请求物品通过火箭发送给他们。\n\n重要提示：当指定了星球和地点（显示有摄像头按钮）时，火箭必须从该特定地点发射，因此你需要在那里建造一个火箭发射井。

