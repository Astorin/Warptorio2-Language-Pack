warptorio-charting=Разблокирует способность реактора сканировать и открывать окружающие области. Эта способность также добавляет невидимый радар в центре этажей фабрики и бойлерной.
warptorio-stabilizer=Разблокирует способность реактора стабилизировать платформу, сводя к минимуму выбросы и рост загрязнения.
warptorio-accelerator=Разблокирует способность реактора "пред-зарядка варпа", позволяя быстрее делать варп.
warptorio-reactor=Исследуйте, сконструируйте и отремонтируйте компоненты, необходимые для восстановления варп-реактора и совершенствования его функциональности для возвращения домой. Каждый уровень добавляет 10 минут к таймеру авто-варпа, пред-зарядка варпа быстрее на 1 тик/с, и могут быть ещё эффекты.

warptorio-reactor-6=Исследуйте, сконструируйте и отремонтируйте компоненты, необходимые для восстановления варп-реактора и совершенствования его функциональности для возвращения домой. Каждый уровень добавляет 10 минут к таймеру авто-варпа, пред-зарядка варпа быстрее на 1 тик/с, и могут быть ещё эффекты. Этот уровень вызывает материальный варп-реактор и отключает таймер авто-варпа.
warptorio-reactor-8=Исследуйте, сконструируйте и отремонтируйте компоненты, необходимые для восстановления варп-реактора и совершенствования его функциональности для возвращения домой. Каждый уровень добавляет 10 минут к таймеру авто-варпа, пред-зарядка варпа быстрее на 1 тик/с, и могут быть ещё эффекты. Этот уровень позволяет вам управлять варп-реактором. Шанс посадки на целевую планету составляет 30%.


