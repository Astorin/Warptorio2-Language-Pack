marvin_tech-0=这是马文，一个乐于助人但抑郁又无聊的机器人。要建造它，你必须在背包中拥有所需的材料，并点击按钮交付。
marvin_tech-1=将马文升级到2级，获得新能力：修理物品、采集 [img=item/stone]、科技包 [img=item/logistic-science-pack]。每级还增加生命值、伤害、抗性，并且会采集和修理得更多。
marvin_tech-2=将马文升级到3级，获得新能力：采集 [img=item/iron-ore]、科技包 [img=item/military-science-pack]。每级还增加生命值、伤害、抗性，并且会采集和修理得更多。
marvin_tech-3=将马文升级到4级，获得新能力：采集 [img=item/copper-ore]、科技包 [img=item/chemical-science-pack]。每级还增加生命值、伤害、抗性，并且会采集和修理得更多。
marvin_tech-4=将马文升级到5级，获得新能力：采集 [img=item/uranium-ore]、科技包 [img=item/production-science-pack]。每级还增加生命值、伤害、抗性，并且会采集和修理得更多。
marvin_tech-5=将马文升级到6级，获得新能力：科技包 [img=item/utility-science-pack]。每级还增加生命值、伤害、抗性，并且会采集和修理得更多。
marvin_tech-6=将马文升级到7级，获得新能力：科技包 [img=item/space-science-pack]。每级还增加生命值、伤害、抗性，并且会采集和修理得更多。
marvin_tech-7=马文已完全升级

