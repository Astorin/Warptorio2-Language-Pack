drg_mission_explore_cave_tooltip2=Исследуйте пещеру, открывайте переходы и большие помещения. Продолжайте копать!
drg_mission_mining_tooltip2=Только полезные ископаемые, собранные Мулом, считаются для завершения миссии. Он автоматически собирает руду из ближайших сундуков. После успешного извлечения все собранные руды передаются во внутреннее хранилище Space Rig.
drg_mission_killing_tooltip2=Бурите сквозь пещеру, чтобы найти главного врага. Уничтожьте его, чтобы завершить задание.
drg_mission_pest_control_tooltip=Уничтожьте расплодившихся врагов.
drg_mission_pest_control_tooltip2=Убейте указанное количество единиц врага, турелей или ульев.
drg_mission_underground_production_tooltip=Произведите предметы в пещере
drg_mission_rescue_imprisoned_miners_tooltip=Спасти заключённых шахтёров из пещеры

drg_mission_scan_cave_tooltip2=Постройте радары в трёх заданных местах и держите их рабочими. Каждый радар должен завершить 10 сканирований.
drg_mission_drill_tooltip2=Для работы буровой установки требуется [item=coal], который вы найдёте в пещере. Оставайтесь в зоне её действия с углём в инвентаре, и она будет двигаться к Кристаллу Осколка. Как только она достигнет цели, продолжайте снабжать её углем, чтобы пробурить кристалл до полного разрушения, завершив тем самым миссию. Примечание: игроки не могут копать впереди буровой установки. Держитесь поблизости и расчищайте путь по мере её продвижения.
drg_mission_rescue_mule_tooltip2=Ищите в пещере 4 потерянных Мула. Восстановите их и сопроводите их обратно в капсулу для возвращения.
drg_mission_hacking_tooltip2=Конкурирующая компания оставила десантный модуль после неудачной миссии. Подключите его к размещённому хакерскому терминалу с помощью зелёных проводов, чтобы взломать его и получить доступ к ценным данным и ресурсам, находящимся внутри.
drg_mission_mine_liquid_tooltip2=Найдите и отремонтируйте 3 экстрактора жидкости в пещере. После активации они начнут качать ценную жидкость. Постройте трубы, чтобы подключить их к Отправщику жидкости, закачайте жидкость в бочки и загрузите отправщик. Вам понадобятся [img=item/barrel]бочки. Запустите груз, чтобы завершить миссию.
drg_mission_rare_minerals_tooltip2=Залежи редких минералов разбросаны по всей пещере. Копайте, чтобы найти блестящие камни, и добывайте их киркой. Помните, что только полезные ископаемые, собранные Мулом, считаются для завершения миссии, поэтому поместите их в ближайшие сундуки для Мула.
drg_mission_deep_core_mining_tooltip2=Найдите и восстановите брошенный Большой глубинный экстрактор, захороненный глубоко в пещерах. Запустите его в работу, используя [img=item/engine-unit]двигатели, [img=item/advanced-circuit]продвинутые схемы и [img=item/iron-gear-wheel]шестерни.
drg_mission_train_fuel_delivery_tooltip=Проложите рельсы, чтобы доставить топливо для Большого глубинного экстрактора
drg_mission_train_fuel_delivery_tooltip2=Большому глубинному экстрактору требуется топливо для работы. Вам нужно построить железную дорогу и транспортировать [fluid=drg_fluid_gasola] вдоль опасной пещеры. Заставьте буровую машину снова работать! Между экстрактором и поездом есть какая-то загадочная связь, так что машина работает только тогда, когда поезд рядом.
drg_mission_car_power_delivery_tooltip=Отремонтируйте автомобиль, поезжайте на нём к энергокристаллу, а затем к ракете.
drg_mission_car_power_delivery_tooltip2=Конкурирующая компания забросила ракетную шахту глубоко в этой системе пещер. Согласно разведывательным данным, там до сих пор хранятся ценные зашифрованные данные — и мы намерены их похитить. Их системы безопасности питаются от загадочного источника энергии, добываемой из расположенного поблизости [img=entity/drg_crystal_blue]кристалла. Для транспортировки этой энергии они разработали специальный транспорт, способный заряжаться напрямую от кристалла. Найдите повреждённый транспорт, отремонтируйте его, доберитесь до [img=entity/drg_crystal_blue]кристалла, чтобы зарядиться, а затем доставьте накопленную энергию к ракетной шахте, чтобы разблокировать хранилище данных.


