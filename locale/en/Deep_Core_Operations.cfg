[space-location-description]
drg-biome-nauvis=The central mining zone and primary operational hub. A relatively stable subterranean region with established infrastructure and access routes to deeper layers. Standard hostile fauna inhabit the outskirts. While no specific resource dominates, all rare minerals may be found here in extremely low concentrations.
drg-biome-desert=Fractured dry caverns dominated by brittle rock and deep fissures. The terrain is unstable, with dust pockets and collapsing ceilings common during excavation. Native arachnid predators lurk beneath the surface, striking from hidden tunnels. Occasional deposits of Pearlite Fragments can be found exposed in the rock, along with rarer traces of Amberium Blocks.
drg-biome-vulcanus=A volatile network of magma-heated tunnels, where intense heat and pressure shape the environment. Rivers of molten rock illuminate the caverns, and seismic activity is frequent. Explosive Biters inhabit these depths, charging intruders with devastating force. Rich veins of Ferronox are embedded deep within the hottest zones.
drg-biome-gleba=Dense subterranean growth has overtaken these caverns, forming thick root systems and mineral-rich organic layers. Visibility is reduced by overgrowth, and terrain can shift under pressure. The area is guarded by Penthapods and Stompers, territorial and highly resilient. This biome is the primary source of Amberium Blocks, formed within the organic-mineral matrix.
drg-biome-aquilo=Frozen tunnels carved through dense ice and crystal formations. Light refracts through crystalline walls, but movement is slowed by extreme cold. Frost Biters roam these channels, capable of freezing targets and machinery. Large deposits of Pearlite Fragments are commonly found embedded within the ice layers.
drg-biome-fulgora=Electrically charged caverns where constant energy discharges arc across the environment. The air hums with static, and machinery frequently suffers interference. Ancient autonomous droids patrol these zones, remnants of a lost civilization, highly resistant and precise. The unstable energy fields give rise to deposits of Spikite, crackling with stored charge.
drg-biome-toxic=Corroded and toxic tunnel systems filled with dense gas pockets and reactive minerals. Visibility is low, and prolonged exposure is hazardous. Toxic Biters thrive here, releasing poisonous clouds during combat. The primary resource is Radiantite, a volatile mineral that emits harmful energy and contaminates surrounding areas.


