[technology-description]
wdm_drill_cannon=一种便携式钻探炮，专为敌对地下环境设计。装备后，可发射带旋转钻头的冲击弹药，能快速击碎岩石并在深洞中开辟通道。对于必须在压力下前进并避免被困的工程师来说至关重要。
wdm_warp_drive_tech=升级主跃迁引擎技术，所有其他跃迁功能都与之关联。此技术通过在飞船终端修复跃迁引擎来解锁。
wdm_ship_floors_tech=解锁新的飞船楼层，可通过电梯进入。
wdm_ship_floor_size_tech=扩展飞船楼层建造限制。在Alt模式下，你可以看到黄色边界。
wdm_ship_power_tech=扩展飞船总动力反应堆容量。
wdm_warp_chest_tech=创建跃迁箱，在无限距离内共享同一物品栏，允许在飞船与外部世界之间转移物品。每个科技等级启用一种新型箱子来共享物品。
wdm_warp_pipe_tech=创建跃迁管道，允许在飞船与外部世界之间传输流体。每个科技等级启用一种新型管道以传输不同流体。
wdm_alien_involution_bomb=飞船能力：向大气中释放一种毒素，使外星威胁退化，削弱其力量。同时清除所有污染。
wdm_ability_charting=允许飞船扫描仪从飞船方向测绘星球表面。
wdm_ability_blast_cannon=允许飞船向指定方向发射能量冲击波以打击敌人或挖掘洞穴隧道。
wdm_ability_accelerator=飞船能力：跃迁引擎充能时间加速减半。消耗 [img=fluid/warponium-fluid] 跃迁燃料。
wdm_ability_stabilizer=飞船能力：稳定器作用于飞船跃迁引擎，使其能够在当前位置停留更长时间。
wdm_ship_platform_camera=飞船能力：启用平台摄像头，以便观察外部情况。
wdm_platform_bomb=飞船能力：在飞船平台上释放强大的冲击波，仅伤害敌人。
wdm_ability_defense_capsules=飞船能力：在地表释放飞船防御无人机
wdm_ability_ship_scanner=飞船能力：飞船扫描仪可在星球表面寻找兴趣点。
wdm_ship_tile_deconstructor=允许使用特殊工具选择区域内的飞船地块进行拆除。科技等级越高，回收飞船地块的几率越高。
wdm_external_defense_ship_platform=允许在正常飞船大小限制之外建造特殊地块，仅限主平台。科技等级越高，可放置以扩展飞船的地块数量越多（350 + [每额外等级增加175]）。
wdm_warp_power_tower=允许建造电力塔，远程消耗飞船电力，并与飞船终端通信以传输电路信号。
wdm_warponium_processing=允许加工跃迁矿，仅在地下矿脉（洞穴内）发现。
wdm_warponium_fuel=允许加工跃迁燃料，供跃迁机器消耗。
wdm-linked-chest=允许在飞船楼层之间转移物品
wdm_ship_pipe=允许通过连接管道在飞船楼层之间传输流体。
wdm_scan_another_planet_resource=允许飞船扫描搜索富含所需资源的星球。如果扫描成功，跃迁引擎将在下次跃迁时设定目的地为该星球。成功率随每次 [img=technology/wdm_warp_drive_tech-1] 跃迁引擎技术升级而提高。扫描消耗 [img=fluid/warponium-fluid] 跃迁燃料。
wdm_scan_soil_analisys=允许飞船分析当前星球土壤以识别资源丰富度。
wdm_return_to_previous_planet=允许跃迁引擎将下次跃迁航线设定为之前访问过的星球。扫描完成后，如果成功设定目的地为所选星球，船员将收到通知。
wdm_ability_mining_bomb=飞船能力：在星球上释放采矿核弹，可能揭示一些隐藏的地下资源路径
wdm_basic_ship_tiles=建造这些地块以扩展飞船大小。每种类型允许建造特定建筑。
wdm_warp_resource_sucker=这种特殊机器允许将资源矿脉直接跃迁至飞船上的 [item=acid-refined-concrete] 资源地块。每次科技升级提高资源提取量，但也消耗更多电力。
wdm_ship_resource_tile_limit=扩展 [entity=wdm_warp_resource_sucker_1] 跃迁资源吸取器使用的飞船资源地块建造限制
wdm_ship_win=当此研究完成时，飞船被视为完全修复！这意味着不再有故障，不再有污染。你可以前往任何星球。随时跃迁。
wdm_warp_insured_room=允许进入新的飞船楼层，船员可在此使用 [item=pink-refined-concrete]跃迁保障地块建造2个房间，每次科技升级使其更大。在其上建造的任何东西都可跃迁至外部世界，并将在飞船跃迁时或在飞船终端上自动召回。
wdm_spaceship_solarium=飞船日光室是跃迁保障层上的一个新区域，太阳能板或风力涡轮机可受益于外部世界的自然能量。每级增加船员可建造特殊 [item=blue-refined-concrete]飞船蓝色地块的面积。
wdm_spaceship_condenser=允许飞船从星球大气中冷凝水。每级增加产水量。要获取水，请放置与飞船冷凝器信号（[img=virtual-signal/wdm_signal_condenser]）连接的飞船管道 [img=item/wdm_ship_pipe]。
wdm_ability_attack_droid=释放跃迁攻击机器人，追捕附近敌人。每级增加一个机器人。
wdm_home_planet=允许选择一个已知星球并设为母星。从此它将持久存在。要选择星球，打开星球信息面板，已知星球按钮，然后点击母星按钮。
wdm_build_on_home_planet=允许在母星上的飞船外部建造任何东西。只需基础混凝土地块即可。
wdm_ability_remove_planet_anomaly=飞船能力：一种炸弹，作用于星球异常的成因，消除其效果。
wdm-storage-room=允许进入新的飞船楼层（H）并解锁飞船仓库。每次科技升级使其更大。可在此建造任意数量的 [entity=warp_chest_1]。
wdm_space_market=每次升级使空间站市场提供更好的商品：更多物品和品质几率
wdm_warp_pollution_redux=减少破损飞船产生的污染。每级减少8%排放
wdm_pirate_ship_search=允许建造一种特殊的太空探测器，能够定位海盗主飞船的实际位置，以便你面对其头目船长。从火箭发射井发射探测器。[img=virtual-signal/signal-info][color=green]通过击败海盗头目，然后入侵海盗飞船上的主终端来赢得游戏。[/color]
warp_electric_mining_drill=此钻机只能在飞船上建造，用于开采 [entity=wdm_warp_resource_sucker_1] 吸取的资源。
wdm_warp_timer_clock=一种未来主义腕戴设备，与不稳定的跃迁核心连接，显示下一次跳跃的精确倒计时。在船员被抛入未知之前，它给予宝贵的时间准备。[在上方界面显示倒计时，并警告飞船外的船员]
wdm_ship_fix_lock=你在空间站了解[color=purple]异星工厂古代符文[/color]，测试不同的符文。查看飞船面板按钮获取帮助。
wdm_artifact_tech_trigger=查看你的已知星球列表。当条件满足时，它会显示此遗物的位置。
wdm_enemy_evolution_tracker=允许飞船追踪敌人进化。显示在星球信息面板上，以便你关注每个星球上敌人的进化情况。


