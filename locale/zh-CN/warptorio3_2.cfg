warptorio-warpspider=完善跃迁反应堆及其技术在载具方面的应用。

warptorio-homeworld=允许你定居一颗星球。

warptorio-charting=解锁反应堆能力，扫描并揭示周围区域。测绘还会在工厂层和锅炉层（如果你有它们的中心建筑）增加一个隐形雷达。
warptorio-stabilizer=解锁反应堆能力，稳定平台以最小化污染排放和污染增长。
warptorio-accelerator=解锁反应堆能力，为跃迁功能预充能以加快跃迁离港速度。
warptorio-reactor=研究、建造并修复重建跃迁反应堆所需的组件，完善其功能以返回家园。每级增加自动跃迁计时器10分钟，跃迁预充能加快1秒，并可能有其他效果。

warptorio-reactor-6=研究、建造并修复重建跃迁反应堆所需的组件，完善其功能以返回家园。每级增加自动跃迁计时器10分钟，跃迁预充能加快1秒，并可能有其他效果。此等级会生成物理跃迁反应堆并禁用自动跃迁计时器。
warptorio-reactor-8=研究、建造并修复重建跃迁反应堆所需的组件，完善其功能以返回家园。每级增加自动跃迁计时器10分钟，跃迁预充能加快1秒，并可能有其他效果。此等级允许你操控跃迁反应堆。降落在目标星球的几率为30%。


warptorio-harvester-floor=跃迁收割机层。
warptorio-harvester-size=跃迁收割机层规模。
warptorio-harvester-east-gate=解锁东侧（右侧）收割平台，一个便携可部署的平台，你可以在上面建造。
warptorio-harvester-west-gate=解锁西侧（左侧）收割平台，一个便携可部署的平台，你可以在上面建造。

warptorio-harvester-east=跃迁收割机东平台规模。
warptorio-harvester-west=跃迁收割机西平台规模。

warptorio-combinator=这些运算器提供平台信息的读数，如计时器和跃迁状态。适用于高级自动化。
warptorio-alt-combinator=为收割机平台添加静态运算器，在收割机被召回时自动连接。适用于高级自动化。

[fuel-category-name]
warp=跃迁燃料

[warptorio_lore]
1_1=你在这座平台上初次醒来时略感头痛，唯一确信的是，你必须重建你的实验，逃离这个危险的世界，返回家园。
1_2=你拼凑了一些电线、开关和旋钮，将它们连接到平台上。
1_3=虽然你不确定是否取得了什么成果，但你至少感觉多了一些掌控感。

2_1=关于发生了什么的记忆开始逐渐浮现。你当时正在研究一种能够扭曲和置换时空的实验性反应堆。
2_2=你回忆起早期实验，并用迄今为止在旅途中找到的简陋资源着手复现它们。
2_3=你所感受到的进展让你充满了决心。

3_1=啊，对了，实验出错了！跃迁反应堆破裂，在局部跃迁空间结构中撕开了一道裂隙，将你和跃迁平台抛入了太空中一个相对的异维空间。
3_2=你凭借记忆匆匆组装了跃迁反应堆控制面板，但随即意识到在它们能够运作之前，你需要先有反应堆核心。
3_3=那种知道该做什么的感觉让你充满了决心，只要你拥有做这件事的资源。

4_1=在事故之前，你记得自己曾为掌握跃迁空间控制的无限应用而感到兴奋，从而变得大意了。
4_2=你已经完成了反应堆跃迁盘和裂隙核心的建造，但你不会再犯同样的错误了。
4_3=握着脉动的跃迁盘，你充满了决心。

5_1=你认为你知道了实验失败的原因：跃迁盘必须保持稳定，除非通过完美地反转极性——与裂隙核心的跨次元阿特龙能量矩阵成反比平方——来维持它。
5_2=你准备好了跃迁盘，以直接从跃迁空间中抽取你所需的完美材料。
5_3=这是一项冒险的策略，但你相信这是你逃离这些被野蛮外星生物侵占的世界、回归文明的唯一机会。

6_1=当反应堆跃迁成形时，一阵响亮的能量波动在你的跃迁平台上扩散开来，你知道这项技术将把你的文明提升到超乎他们想象的地步。
6_2=你决定在跃迁经过一个又一个世界、寻找家园的过程中，继续你的跃迁反应堆实验——只要你知道如何驾驶这艘船。
6_3=跃迁反应堆终于就位，这让你充满了决心。

7_1=你开发出了一种方法，建造一个小型化的跃迁盘，连接到你的反应堆裂隙核心上，从而实现通过跃迁空间传递热能。
7_2=你相信这可以进一步精炼成一种方法，通过跃迁盘极性的完美准错位，从跃迁空间中抽取化学阿特龙能量燃料棒。
7_3=这种新获得的、对跃迁空间和时间的灵活掌控让你充满了决心。

8_1=你几乎记不清在维度的漂流中造访过多少世界了，但你发现了一种方法，可以测量反应堆裂隙核心所发射的阿特龙能量信号中的维度相对性。
8_2=因此，你能够绘制出你去过的地方以及前方可能有什么的地图。但要当心，跃迁反应堆可能并不总是与你意见一致——就像这一切开始的那一天一样。
8_3=你的母星就在眼前，这让你充满了决心，你对自己最终的跃迁空间实验的成果感到惊叹。

