wdm_warp_resource_sucker=将此机器放置在矿脉路径上，为其供电并等待它将资源矿脉直接跃迁至飞船上的 [tile=acid-refined-concrete] 资源地块。飞船地块必须为空。
wdm_warp_insured_desc=此跃迁保障区域可放置在外部世界，在“H”层 [item=pink-refined-concrete]跃迁保障地块上建造的任何东西都将跃迁至该位置。[color=yellow]部署房间需要消耗飞船中 25 [img=fluid/warponium-fluid] 跃迁燃料。[/color]飞船将在跃迁时自动召回保障区域。
wdm_rune_test_chest=在此祭坛上插入一个古代符文
wdm_rune_altar_log=在此你可以查看你对异星工厂古代符文的掌握情况。你的测试将被记录在此。你可以添加自己的注释和猜测。
wdm_charge_generator=为此设备充能以解锁其内容
wdm_broken_lab=通过插入所需材料修复此遗物以恢复其内容。
warp_electric_mining_drill=此钻机只能在飞船上建造，用于开采 [entity=wdm_warp_resource_sucker_1] 吸取的资源。
