drg_mission_silo=Эта ракета будет запущена при заполнении ценными жидкостями для Space Rig.
drg_drop_pod_hack_mission=Похоже, этот десантный модуль, принадлежащий конкурентам, потерпел аварию и был брошен здесь. Его можно взломать, чтобы извлечь ценные данные и ресурсы. Подключите его к [entity=drg_hacking_terminal] с помощью зелёных проводов, чтобы начать процесс взлома.
drg_hacking_terminal=Этот терминал позволяет взламывать вражеские системы во время хакерских миссий. Зарядите его энергией и соедините терминал и целевой десантный модуль зелёными проводами.
drg_broken_lab=Почините этот артефакт, чтобы получить его содержимое, вставив необходимые материалы.
drg_mule_broken=Похоже, ваш Мул был уничтожен. Нажмите, чтобы показать панель ремонта.
drg_rescue_mule_broken=Это сломанный старый Мул. Нажмите, чтобы показать панель ремонта.
drg_platform_linked_chest=Перемещает элементы между внешней платформой и помещениями Space Rig.
drg_platform_linked_chest_2=Перемещает элементы между внешней платформой и помещениями Space Rig.
drg_supply_chest=Предметы, хранящиеся здесь, могут быть отправлены из Space Rig в подземную миссию с помощью пульта управления
drg_mule_fluid_collector=Жидкость, хранящаяся здесь, будет собираться Мулом, чтобы попасть на Space Rig при эвакуации
drg_driller_machine=Эта буровая установка требует [item=coal] для работы. Оставайтесь в зоне её действия с углём в инвентаре. Примечание: игроки не могут копать впереди буровой установки.
drg_mission_terminal=Управление выбором миссии и подготовкой запуска капсулы. Подключено к сети хаба платформы.
drg_mule_chest=Доставляет ресурсы, хранящиеся на Space Rig и добытые Мулом во время подземных горных работ. Нажмите, чтобы открыть запасы Space Rig
drg_orbital_fluid_uplink=Эта машина позволяет перекачивать жидкости из пещер в Space Rig. Каждое улучшение технологии добавляет ещё одну жидкость и увеличивает скорость передачи. Разрешена только одна машина на каждую пещеру.
drg_energy_receiver=Получает энергию от космической платформы. Количество передач ограничено исследованиями.

