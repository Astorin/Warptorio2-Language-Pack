drg_mission_silo=Ta rakieta zostanie wystrzelona, gdy zostanie napełniona cennymi płynami, w kierunku platformy kosmicznej.
drg_drop_pod_hack_mission=Wygląda na to, że ten moduł ratunkowy należący do konkurencji rozbił się i został tu porzucony. Można go zhakować, aby odzyskać cenne dane i zasoby. Podłącz go do [entity=drg_hacking_terminal] za pomocą zielonych kabli, aby rozpocząć proces hakowania.
drg_hacking_terminal=Ten terminal pozwala na włamanie się do wrogich systemów podczas misji hakerskich. Naładuj go energią i podłącz zarówno terminal, jak i docelowy Drop Pod za pomocą zielonych kabli.
drg_broken_lab=Napraw ten artefakt, aby odzyskać jego zawartość, wkładając wymagane materiały.
drg_mule_broken=Wygląda na to, że twój Muł został zniszczony. Kliknij, aby wyświetlić panel naprawy.
drg_rescue_mule_broken=To jest zepsuty stary Muł. Kliknij, aby wyświetlić panel naprawy.
drg_platform_linked_chest=Przenosi przedmioty między platformą zewnętrzną a wnętrzem platformy kosmicznej
drg_platform_linked_chest_2=Przenosi przedmioty między zewnętrzną platformą a wnętrzem platformy kosmicznej.
drg_supply_chest=Przedmioty przechowywane tutaj mogą być wysyłane z platformy kosmicznej do podziemnej misji za pomocą zdalnego sterowania
drg_mule_fluid_collector=Płyn przechowywany tutaj zostanie zebrany przez Muła i przewieziony na platformę kosmiczną po wydobyciu
drg_driller_machine=Ta wiertnica wymaga [item=coal]węgla do działania. Trzymaj się w pobliżu jej obszaru działania, mając węgiel w ekwipunku. Uwaga: Gracze nie mogą kopać przed wiertnicą.
drg_mission_terminal=Służy do wyboru misji i przygotowania startu kapsuły ratunkowej. Podłączony do sieci platformy kosmicznej.
drg_mule_chest=Dostarcza zasoby przechowywane w platformie kosmicznej, zebrane przez Muła podczas podziemnych operacji wydobywczych. Kliknij, aby uzyskać dostęp do rezerw platformy kosmicznej
drg_energy_receiver=Odbiera energię z platformy kosmicznej. Liczba łączy jest ograniczona przez ulepszenia badawcze.



