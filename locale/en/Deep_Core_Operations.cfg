
drg_intro_message=Your crew was approaching the fractured world of [img=drg_planet]Fracta Mantis C — a shattered planet identified by Deep Core Operations as rich in valuable resources for space mining. During orbital insertion, the Space Rig collided with one of the planet's massive fragments. The damage was critical. [img=item/thruster]Thrusters were lost, and large sections of the structure were destroyed. Your crew is now trapped inside a small cargo compartment, cut off from the ship's vital systems. Most of the rig lies in ruins. \n All that remains operational is a small terminal. Through it, you discover you can still control the ship's external mechanical arms. Perhaps, by operating them, you can gather essential resources from orbit and begin repairing the most critical damage — enough to rebuild a functional control room. A damaged but intact transfer duct still connects the exterior to your compartment, allowing materials to be moved in and out. Press [img=drg_elevator] to access the external platform and take control of the mechanical arms.
drg_intro_message_2=Great! Those arms were really helpful! By repairing the [img=entity/drg_space_rig_terminal]Terminal, you can now remotely connect to other damaged and blocked sections, restoring them using the required materials. Accessing and repairing those areas should be your top priority!\nThe terminal now also shares power with the exterior platform.
drg_intro_message_3=Our [entity=drg_mule_droid_1]MULE is there, safe and sound! Awesome! Looks like the mining operation is still alive after all.\nManagement never sends a Space Rig into deep orbit without a fully operational MULE unit onboard. Those machines are the backbone of every mining expedition — hauling minerals, transporting supplies, and keeping miners alive when everything underground wants them dead. Losing one would cripple the entire operation. After restoring power to the damaged storage bay, the MULE finally responded to the terminal handshake. Its systems are old, battered, and covered in dust from whatever happened here… but it still works. That's all we need. With the MULE back online, you can now transport resources more efficiently across the rig and prepare for large-scale planetary extraction. 
drg_intro_message_4=The [entity=drg_mission_terminal]Mission Terminal is back online! Excellent work. Now that communications have been restored, the rig can once again establish synchronized links with the planetary scanners and deep-core navigation satellites. New mining operations are already appearing in the system, and the caves beneath the surface are being mapped in real time. More importantly… the [img=entity/drg_drop_pod]Drop Pod launch bay is operational again. That means we can finally deploy miners directly into the underground cave networks where the richest mineral veins are located.\n Be warned, though — automated scans show abnormal biological activity deep below the crust. The caves have been left undisturbed for far too long, and whatever lives down there has had plenty of time to spread. Still, Management wants those minerals, and now we finally have the means to reach them.\nThe mission network is online. The Drop Pod is fueled. The caves are waiting. Rock and Stone, miner!

