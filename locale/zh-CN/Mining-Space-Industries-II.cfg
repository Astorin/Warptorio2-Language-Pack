page_mission_name_M_unique_rocket_silo=好的，我们刚刚收到MSI发来的坐标，告诉我们必须在何处开始建造火箭发射井。那是地球上向太空发射火箭的最优位置。因此，这是唯一允许开始挖掘过程的地方。\n\n注意！务必带上[img=entity/msi_companion_synthetic_pistol_gunner_1]大卫到施工现场。这一知识将有助于将建造成本和时间减半！开工！

