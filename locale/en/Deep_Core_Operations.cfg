drg_class_scout_tooltip=The Scout is exceptionally agile, starting with a significant movement speed bonus to navigate caves with ease. He excels at rapid repositioning and high-velocity combat with light weapons like the SMG and Flare Gun. However, he gains no initial HP bonus and his mining and crafting speeds are standard. He relies on speed rather than raw durability to survive.
drg_class_heavy_tooltip=The Heavy is the frontline bulwark, boasting the highest starting HP and additional inventory slots for ammunition. While he begins with a noticeable movement and mining penalty due to his massive armor and heavy weaponry (like the Minigun and Hand Cannon), he scales into an unstoppable force. He can sustain multiple energy shields, making him the only class capable of tanking direct dreadnought hits.
drg_class_engineer_tooltip=The Engineer is the master of the Space Rig's technology. He features the fastest crafting speed and the most efficient turret deployment (lowest delay). Though his physical stats are modest, his utility is unmatched, being the only one authorized to use advanced tech like the Seismic Charge and Tesla Gun. He turns any position into a fortress in seconds.
drg_class_miner_tooltip=The Miner is a power-drilling specialist with a massive 60% bonus to initial mining speed. He is built for environmental manipulation, carrying extra inventory and heavy-duty exoskeletons. Equipped with area-denial tools like the Flamethrower and Poison Capsules, he clears paths and pests with equal efficiency. He is the backbone of any extraction operation.

