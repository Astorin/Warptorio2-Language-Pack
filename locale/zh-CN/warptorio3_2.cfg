[mod-name]
warptorio3_2=星际跃迁者3 (无太空时代)

[mod-description]
warptorio3_2=在一个平台上建立您的基地，该平台可以在行星之间跃迁，并在敌人压倒您之前将其清除。修复跃迁反应堆并找到你的家。单mod构筑：Warptorio 3 (Warptorio 2.0.0 + Planetorio 0.2.0)。 禁用太空时代。

