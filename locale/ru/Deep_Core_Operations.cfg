
drg_intro_message=Ваш экипаж приближался к раздробленному миру [img=drg_planet]Фракта Мантис C — разрушенной планете, которую компания "Deep Core Operations" считала богатой ценными ресурсами для космической добычи. Во время выхода на орбиту космическая платформа "Space Rig" столкнулась с одним из огромных обломков планеты. Повреждения оказались критическими. [img=item/thruster]Ускорители были выведены из строя, а значительные участки конструкции оказались разрушены. Ваш экипаж теперь заперт в небольшом грузовом отсеке, отрезанном от жизненно важных систем корабля. Большая часть лежит в руинах.\nЕдинственное, что осталось в рабочем состоянии, — это небольшой терминал. С его помощью вы обнаруживаете, что всё ещё можете управлять внешними механическими манипуляторами корабля. Возможно, управляя ими, вы сможете собрать необходимые ресурсы с орбиты и начать ремонт самых критических повреждений — достаточно, чтобы восстановить работоспособную диспетчерскую. Повреждённый, но уцелевший переходный канал по-прежнему соединяет внешнюю часть с вашим отсеком, позволяя перемещать материалы внутрь и наружу. Нажмите [img=drg_elevator], чтобы выйти на внешнюю платформу и взять под контроль механические манипуляторы.
drg_intro_message_2=Отлично! Эти манипуляторы оказались очень кстати! Отремонтировав [img=entity/drg_space_rig_terminal]Терминал, вы теперь можете удалённо подключаться к другим повреждённым и заблокированным участкам и восстанавливать их с помощью необходимых материалов. Доступ к этим участкам и их ремонт должны стать вашим главным приоритетом!\nТеперь терминал также обменивается энергией с внешней платформой.
drg_intro_message_3=Наш [entity=drg_mule_droid_1]Мул на месте, целый и невредимый! Здорово! Похоже, добыча всё-таки продолжится.\nРуководство никогда не отправляет космическую платформу на дальнюю орбиту без полностью исправного Мула на борту. Эти машины — основа любой добывающей экспедиции: они вывозят руду, доставляют припасы и спасают шахтёров, когда всё под землёй стремится их погубить. Потеря одного из них парализовала бы всю операцию. После восстановления питания в повреждённом отсеке хранения Мул наконец ответил на запрос терминала. Его системы старые, изношенные и покрыты пылью от того, что здесь произошло… но он всё ещё работает. Это всё, что нам нужно. Теперь, когда Мул снова в строю, вы можете более эффективно перевозить ресурсы по всей платформе и готовиться к крупномасштабной добыче на планете.
drg_intro_message_4=[entity=drg_mission_terminal]Терминал миссий снова в строю! Отличная работа. Теперь, когда связь восстановлена, буровая установка снова может устанавливать синхронизированные соединения с планетарными сканерами и навигационными спутниками для глубоких слоёв. В системе уже появляются новые горнодобывающие операции, а пещеры под поверхностью картографируются в режиме реального времени. Но что ещё важнее… отсек запуска [img=entity/drg_drop_pod]Капсула снова готова к работе. Это означает, что мы наконец-то сможем отправлять шахтёров прямо в подземные пещерные лабиринты, где находятся самые богатые жилы полезных ископаемых.\n Но будьте осторожны — автоматическое сканирование показывает аномальную биологическую активность глубоко под земной корой. Пещеры оставались нетронутыми слишком долго, и у того, что там обитает, было достаточно времени, чтобы размножиться. Тем не менее, руководство хочет эти минералы, и теперь у нас наконец-то есть средства, чтобы до них добраться.\nСеть миссий подключена. Капсула заправлена. Пещеры ждут. Вперед, шахтёр!

