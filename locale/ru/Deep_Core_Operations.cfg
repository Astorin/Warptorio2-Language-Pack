[technology-description]
drg_freeze_chest=Замедляет порчу предметов
drg_seismic_charge=Тяжёлая бомба, которая наносит урон по области и копает проходы!
drg_molly_upgrade=Улучшение Мула увеличивает сопротивляемость, здоровье, инвентарь и сетку снаряжения. Каждый уровень повышает бонус к сбору руды на 10%.
drg_energy_receiver=Позволяет получать энергию от космической платформы Space Rig. Количество одновременных передач ограничено исследованиями.
drg_energy_receiver_extra_links=Увеличивает количество одновременных энергопередач.
drg_tech_toxic_mask=Позволяет изготовить противогаз, защищающий игрока от токсичных газов. Необходимое снаряжение для выживания в токсичных пещерах [space-location=drg-biome-toxic]Toxfract Veins и [space-location=drg-biome-gleba]Verdant Vein Cluster.
drg_tech_license_lightning_rod=Позволяет строить молниеотводы
drg_tech_unlock_biome_gleba=Открывает [space-location=drg-biome-gleba]Verdant Vein Cluster для разведки.
drg_tech_unlock_biome_aquilo=Открывает [space-location=drg-biome-aquilo]Crystalline Channels для разведки.

drg_supply_capsule=Позволяет подземной команде вызывать капсулу снабжения с припасами из Space Rig. Каждый уровень технологии ядра увеличивает количество вызовов на миссию.
drg_platform_linked_chest_2=Позволяет построить ещё один связанный сундук платформы для перемещения предметов между внешней платформой и внутренними помещениями корабля.
drg_ship_fluid_storage=Позволяет кораблю хранить жидкость в резервуаре. Каждый уровень технологии увеличивает емкость хранения на 50000 литров.
drg_Mule_upgrade=Улучшение Мула. Каждый уровень увеличивает его здоровье, вместимость и сетку снаряжения.
drg_ship_resource_storage=Добавляет место на Space Rig для хранения ресурсов. Каждый уровень технологии увеличивает вместимость.
drg_mule_fluid_collect=Позволяет Мулу собирать жидкости, хранящиеся в [entity=drg_mule_fluid_collector]. При успешном извлечении жидкости хранятся внутри SpaceRig.
drg_orbital_fluid_uplink=Эта установка позволяет перекачивать жидкости из пещер на космическую платформу Space Rig через канал передачи. Чтобы обеспечить непрерывную подачу, заполните установку нужной жидкостью из пещеры. После полного заполнения оставьте её в пещере. Если миссия будет успешно завершена и добыча осуществлена, установка будет продолжать перекачивать жидкость на космическую платформу до тех пор, пока она останется в этом регионе (биоме). В каждой пещере допускается размещение только одной такой установки.

drg_drill_cannon=Портативная буровая пушка, предназначенная для использования в неблагоприятных подземных условиях. При использовании она стреляет ударными зарядами с вращающимися буровыми наконечниками, способными быстро разбивать камни и прокладывать проходы в глубоких пещерах. Необходима для инженеров, которые должны продвигаться вперед под давлением и избегать попадания в ловушку.
drg_ship_floors_tech=Разблокирует новый этаж космического корабля, доступный с помощью лифта.

drg_ship_platform_camera=Способность космического корабля: активирует камеру платформы, чтобы вы могли видеть, что там происходит.
wdm-linked-chest=Позволяют переносить предметы между этажами космического корабля.
drg_ship_pipe=Позволяет переносить жидкость между этажами Space Rig с помощью связанных труб. Каждый уровень увеличивает количество труб, которые могут быть установлены на этаже.

drg_enemy_evolution_tracker=Позволяет кораблю отслеживать эволюцию врага. Она отображается на панели информации о планете, поэтому вы можете следить за тем, как враги развиваются на каждой планете.
drg_contract_tasks=Даёт разрешение на принятие контрактов от Галактической Добывающей Компании
drg_tech_mule_containment_chamber=Место для Мула
drg_tech_mission_terminal=Открывает место для сброса груза и терминал миссий на Space Rig, позволяя принимать миссии и отправлять груз в пещеры.
drg_tech_heat_shield=Позволяет путешествовать в экстремальные высокотемпературные области на планете

