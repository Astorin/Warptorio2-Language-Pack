[planet-description]
normal=这个世界让你想起家乡。
uncharted=你环顾四周，仰望星空，不知这个世界是否曾有过名字。
average=周围的生物和资源都很寻常，但你总觉得少了些什么。
barren=这个世界看起来荒无人烟，我们似乎暂时安全。
ocean=四周都是水，仿佛无边无际。附近游来的鱼让你充满了决心。
jungle=这些树木或许足以将你的位置隐藏起来，不让原住民发现……至少能撑一段时间。
dwarf=对于这颗星球上的生物来说，你就像一个巨人……对其自然资源也是如此。
rich=附近一颗中子星合并时的核合成，为这颗星球播下了丰富的资源。
iron=你伴随着一声响亮的金属碰撞声着陆。地面上的闪光让你充满了决心。
copper=跃迁反应堆能量涌动，你感到空气中充满静电。你充满了决心。
coal=散落在这颗星球各处的成堆原始燃料，让你想起很久以前这里曾有的广袤森林。
stone=这颗星球就像你在跃迁时空中的旅程——卡在岩石与硬地之间。
oil=这个地方曾是数千年的生命源泉，但现在它们只是你火焰喷射器的更多燃料。
uranium=这颗星球绿色光芒的温暖让你充满了决心，但你可能不该逗留太久。
midnight=你的双手在黑暗中消失，仿佛就在眼前。这个地方似乎很危险。
polluted=一股浓重的油脂和机械气味突然飘过平台，你怀疑自己是否曾来过这里。
biter=跃迁进来没多久，你的工厂就立刻遭到了围攻。我们必须撑到下一次跃迁！
rogue=啊，只是你常见的那类荒芜废土，没什么好担心的。但似乎有点不对劲。

[planet-target]
uncharted=未勘测
copper=铜


