wdm_ship_tile_deconstructor=用此工具拖拽飞船地块以拆除它。[img=utility/warning_icon]警告！小心别用这工具在太空中砸到自己的脚。
wdm_pirate_ship_search_probe=在火箭发射井中发射以搜索主要海盗飞船
wdm_rune_key=可用于进入异星工厂古代符文测试室
wdm_quantum_flux_core=[color=purple]飞船遗物：[/color] 一个脉动的晶体腔室，以精确的谐波频率引导奇异粒子。没有它，跃迁场无法实现量子相干性。\n[img=utility/warning_icon][color=yellow]此遗物极不稳定——如果不及时固定到跃迁飞船上，可能引爆。[/color]
wdm_phase_lattice_injector=[color=purple]飞船遗物：[/color] 一个由未知合金制成的复杂互锁网格，调节跃迁点火期间的维度相位对齐。其设计暗示非人类智慧。\n[img=utility/warning_icon][color=yellow]此遗物极不稳定——如果不及时固定到跃迁飞船上，可能引爆。[/color]
wdm_subspace_compression_coil=[color=purple]飞船遗物：[/color] 产生跃迁入口所需的初始场压缩。发出低沉嗡鸣，即使在真空中也能共振。\n[img=utility/warning_icon][color=yellow]此遗物极不稳定——如果不及时固定到跃迁飞船上，可能引爆。[/color]
wdm_chrono_field_stabilizer=[color=purple]飞船遗物：[/color] 稳定跃迁隧道内的时空膨胀。没有它，时间剪切将在跳跃中途撕裂飞船。\n[img=utility/warning_icon][color=yellow]此遗物极不稳定——如果不及时固定到跃迁飞船上，可能引爆。[/color]
wdm_warp_singularity_anchor=[color=purple]飞船遗物：[/color] 重组工程的最后基石。在穿越非空间期间锚定飞船坐标。没有它，任何目的地都无法确定。\n[img=utility/warning_icon][color=yellow]此遗物极不稳定——如果不及时固定到跃迁飞船上，可能引爆。[/color]
warp_electric_mining_drill=此钻机只能在飞船上建造，用于开采 [entity=wdm_warp_resource_sucker_1] 吸取的资源。


