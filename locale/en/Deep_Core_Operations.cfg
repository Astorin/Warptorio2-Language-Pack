drg_mission_mining_tooltip2=Only minerals collected by the Mule count toward mission completion. It automatically gathers ores from nearby chests. After a successful extraction, all collected ores are transferred to the Space Rig's internal storage.
drg_mission_killing_tooltip2=Dig through the cave to locate the main enemy. Once found, eliminate it to complete the mission.
drg_mission_pest_control_tooltip2=Kill the specified number of enemy units, turrets or spawners.
drg_mission_scan_cave_tooltip2=Build radars at the 3 designated locations and keep them operational. Each radar must complete 10 scans.
drg_mission_drill_tooltip2=The Drill Machine requires [item=coal] to operate. Stay within its working range with coal in your inventory, and it will move toward the Shard Crystal. Once it reaches the target, keep it supplied to drill through the crystal until it is destroyed, completing the mission. Note: Players cannot dig ahead of the drill. Stay close and clear the path as it advances.
drg_mission_rescue_mule_tooltip2=Search the cave for 4 lost Mule units. Repair them and escort them back to the drop pod for extraction.
drg_mission_hacking_tooltip2=A rival company has abandoned a Drop Pod after a failed mission. Connect it to the deployed hacking terminal using green circuit cables to hack it and secure the valuable data and resources inside.
drg_mission_mine_liquid_tooltip2=Locate and repair 3 fluid extractors in the cave. Once active, they will begin pumping valuable fluid. Build pipes to connect them to the Fluid Payload Launcher, barrel the fluid, and load the launcher. You will need [img=item/barrel]barrels. Launch the payload to complete the mission.
drg_mission_rare_minerals_tooltip2=Rare mineral deposits are scattered throughout the cave. Dig to locate the shiny rocks and mine them with your pickaxe. Remember that only minerals collected by the Mule count toward mission completion, so place them in nearby chests for the Mule
drg_mission_deep_core_mining_tooltip2=Locate and restore the abandoned Big Deep Core Extractor buried deep within the caverns. Bring the machine back online using [img=item/engine-unit]engine units, [img=item/advanced-circuit]advanced circuits, [img=item/iron-gear-wheel]gear wheels, and [img=fluid/lubricant]lubricant.


