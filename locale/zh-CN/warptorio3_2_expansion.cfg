wpe_rare_orez=研究此科技后，稀有矿石将出现在以下星球上：异星蓝岛、火山星球、毒气星球、蓝月星球、冰封富饶星球和环礁星球。
wpe_ship_platform_camera=启用飞船平台摄像头，以便观察平台上的情况。
wpe_warp_platform_bomb=启用此飞船能力，在平台上释放强大的冲击波，仅伤害敌人。所有反应堆能力共享冷却时间。
wpe_warp_linked_chests=创建连接箱，可在任意距离共享同一物品栏。每级科技允许额外建造一对箱子。警告！如果此箱子被跃迁或随收割机部署，其中的所有物品将在过程中丢失！

