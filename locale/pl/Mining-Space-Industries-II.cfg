title_A_mission_name_M_military=[img=item/submachine-gun]Wojsko
title_F_mission_name_M_military=[img=item/submachine-gun]Wojsko
page_mission_name_M_military=Co to jest, na Factoriona?! Porusza się, zabij to, zabij to, ZABIJ TO! Przetestujmy na tym naszą broń, abyśmy mogli opracować lepsze uzbrojenie.

menu_mission_name_M_space_rockets=[img=entity/rocket-silo]Dostawa rakietowa
menu_A_mission_name_M_space_rockets=[img=entity/rocket-silo]Dostawa rakietowa
title_mission_name_M_space_rockets=[img=entity/rocket-silo]Dostawa rakietowa
title_A_mission_name_M_space_rockets=[img=entity/rocket-silo]Dostawa rakietowa
page_mission_name_M_space_rockets=MSI narzuciło ci napięty harmonogram i wymaga określonych zasobów, aby nie uznało cię za zużyty zasób. Musimy więc wysłać im wymagane przedmioty w rakiecie, pokazanej poniżej.\n\nWażna uwaga: Po określeniu planety i lokalizacji (wyświetlanej za pomocą przycisku aparatu) rakieta musi zostać wystrzelona z tej konkretnej lokalizacji, więc musisz zbudować tam silos rakietowy.

menu_mission_name_M_unique_oil=[img=entity/crude-oil]Rafinacja ropy naftowej
menu_A_mission_name_M_unique_oil=[img=entity/crude-oil]Rafinacja ropy naftowej
title_mission_name_M_unique_oil=[img=entity/crude-oil]Rafinacja ropy naftowej
title_A_mission_name_M_unique_oil=[img=entity/crude-oil]Rafinacja ropy naftowej
page_mission_name_M_unique_oil=Te niezawodne urządzenia syntetyczne mają wiele przydatnych funkcji. Powinniśmy przetestować jego funkcję analizy ropy naftowej na tamtej plamie ropy, być może uda nam się nawet rozpocząć jej rafinację.\n\nZabierz [img=entity/msi_companion_synthetic_pistol_gunner_1]Davida – syntetyka – do tej plamy ropy. Przeanalizuje on ropę, aby znaleźć najlepszą technikę jej rafinacji.

menu_mission_name_M_unique_rocket_silo=[img=entity/rocket-silo]Teren silosu rakietowego
menu_A_mission_name_M_unique_rocket_silo=[img=entity/rocket-silo]Teren silosu rakietowego
title_mission_name_M_unique_rocket_silo=[img=entity/rocket-silo]Teren silosu rakietowego
title_A_mission_name_M_unique_rocket_silo=[img=entity/rocket-silo]Teren silosu rakietowego
page_mission_name_M_unique_rocket_silo=Ok, właśnie otrzymaliśmy od MSI współrzędne miejsca, w którym musimy rozpocząć budowę naszych silosów rakietowych. To najbardziej optymalna pozycja na planecie do wystrzeliwania rakiet w kosmos. Jest to więc jedyne miejsce, w którym będzie można rozpocząć proces wykopów.\n\nUWAGA! Pamiętaj, aby zabrać [img=entity/msi_companion_synthetic_pistol_gunner_1]Davida na plac budowy. Jego wiedza pomoże zmniejszyć koszty i czas budowy o połowę! Do pracy!

menu_mission_name_M_unique_satellites=[img=item/satellite]Satelity
menu_A_mission_name_M_unique_satellites=[img=item/satellite]Satelity
title_mission_name_M_unique_satellites=[img=item/satellite]Wystrzeliwanie satelitów
title_A_mission_name_M_unique_satellites=[img=item/satellite]Wystrzeliwanie satelitów
page_mission_name_M_unique_satellites=W ramach naszej kolejnej misji musimy sporządzić mapę większości powierzchni planety (planet), wystrzeliwując nowe satelity. Kiedy stworzymy dobrą i stabilną sieć satelitów, MSI będzie w stanie śledzić wszystko, co zechce znaleźć w tej okolicy.\n\nWięc do dzieła! Buduj i wystrzeliwuj rakiety z [img=item/satellite]satelitami!

menu_mission_name_M_unique_boss_maf-worm-boss-fire-shooter=[img=entity/maf-worm-boss-fire-shooter]Gigantyczny ognisty czerw
menu_A_mission_name_M_unique_boss_maf-worm-boss-fire-shooter=[img=entity/maf-worm-boss-fire-shooter]Gigantyczny ognisty czerw
title_mission_name_M_unique_boss_maf-worm-boss-fire-shooter=[img=entity/maf-worm-boss-fire-shooter]Gigantyczny ognisty czerw
title_A_mission_name_M_unique_boss_maf-worm-boss-fire-shooter=[img=entity/maf-worm-boss-fire-shooter]Gigantyczny ognisty czerw
page_mission_name_M_unique_boss_maf-worm-boss-fire-shooter=Zaczynam lubić tę planetę, trochę czasu zajęło mi przyzwyczajenie się do niej, ale czuję, że teraz jesteśmy w dobrym miejscu. Miło i spokojnie...\n\nO mój Boże. CZY TO GIGANTYCZNA KULA OGNIA LECI W NASZĄ STRONĘ!? FACTORION, RATUJ NAS! Jesteśmy atakowani!\n\nNasze radary wykryły, że atak pochodzi od ogromnego robaka wystrzeliwującego ogień. Zdecydowanie nie płacą mi wystarczająco za to. Musimy zmobilizować wszystkie zasoby, zabić tego robaka i jak najszybciej wyeliminować zagrożenie!

menu_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]Gigantyczne gniazdo dymu
menu_A_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]Gigantyczne gniazdo dymu
title_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]Gigantyczne gniazdo dymu
title_A_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]Gigantyczne gniazdo dymu
page_mission_name_M_unique_boss_msi-smoke-boss-spawner=Zaczyna robić się ciemno w alarmującym tempie. Powinienem przeprowadzić kilka testów, aby upewnić się, że jest to normalne dla tej planety. Wyniki nie mają sensu. Wygląda na to, że robi się ciemniej z powodu rosnącej ilości biologicznego dymu. Jak dym może być biologiczny? W tym tempie planeta zostanie spowita dymem, pogrążając nas w całkowitej ciemności! Dalsze testy wykazały, że obcy ewoluują i robią to, aby zaatakować nas w ciemności i uszkodzić nasze maszyny. Odkryliśmy, że przyczyną całego tego dymu jest ogromne stworzenie, które emituje gęsty czarny dym pokrywający atmosferę. Musimy wyeliminować źródło tych emisji! Może to nie jest politycznie poprawne, ale musimy zniszczyć tego potwora tak szybko, jak to tylko możliwe.

menu_mission_name_M_research_msi_protomolecule_scan=[img=technology/msi_protomolecule_scan]Skanowanie protomolekuły
menu_A_mission_name_M_research_msi_protomolecule_scan=[img=technology/msi_protomolecule_scan]Skanowanie protomolekuły
title_mission_name_M_research_msi_protomolecule_scan=[img=technology/msi_protomolecule_scan]Skanowanie protomolekuły
title_A_mission_name_M_research_msi_protomolecule_scan=[img=technology/msi_protomolecule_scan]Skanowanie protomolekuły
page_mission_name_M_research_msi_protomolecule_scan=Musimy zbadać technologię [technology=msi_protomolecule_scan], która pozwoli nam skalibrować nasze satelity tak, aby wykrywały obecność tajemniczej protomolekuły. Następnie będziemy mogli rozpocząć analizę właściwości nieznanej cząstki i, miejmy nadzieję, lepiej zrozumieć, z czym mamy do czynienia.

menu_mission_name_M_unique_msi_dorment_protomolecule=[img=technology/msi_protomolecule_scan]Analiza protomolekuły
menu_A_mission_name_M_unique_msi_dorment_protomolecule=[img=technology/msi_protomolecule_scan]Analiza protomolekuły
title_mission_name_M_unique_msi_dorment_protomolecule=[img=technology/msi_protomolecule_scan]Analiza protomolekuły
title_A_mission_name_M_unique_msi_dorment_protomolecule=[img=technology/msi_protomolecule_scan]Analiza protomolekuły
page_mission_name_M_unique_msi_dorment_protomolecule=Jest! Nie mogło się przed nami ukrywać wiecznie! Nasze satelity wykryły obecność tajemniczej protomolekuły. Czas rozpocząć analizę właściwości tej nieznanej cząsteczki. Zabierzmy Davida, naszego syntetyka, do właśnie znalezionego artefaktu, aby przeprowadzić bardziej szczegółową inspekcję.

menu_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]Badania nad protomolekułą
menu_A_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]Badania nad protomolekułą
title_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]Badania nad próbką protomolekuły
title_A_mission_name_M_research_msi_protomolecule_awaken=[img=technology/msi_protomolecule_awaken]Badania nad próbką protomolekuły
page_mission_name_M_research_msi_protomolecule_awaken=O cholera! Co się właśnie stało, na Factorion? Czy David został wchłonięty przez tę rzecz? Co się dzieje? A co to za stworzenia nas atakują? Wyglądają jak David! Czy to jest replikacja? Co się dzieje?\n\nOstrożnie, ta rzecz wygląda na niestabilną. Powinniśmy spróbować uwolnić Davida z tego...\n\nMusimy zrozumieć, co się stało. Jeśli uda nam się zbadać [technology=msi_protomolecule_awaken] tę próbkę cząsteczki w naszych laboratoriach, być może odkryjemy, jak poradzić sobie z tym zagrożeniem.

menu_mission_name_M_unique_kill_protomolecule_spawner=[img=technology/msi_protomolecule_awaken]Zabij protomolekułę
menu_A_mission_name_M_unique_kill_protomolecule_spawner=[img=technology/msi_protomolecule_awaken]Zabij protomolekułę
title_mission_name_M_unique_kill_protomolecule_spawner=[img=technology/msi_protomolecule_awaken]Zabij gniazdo zainfekowane protomolekułą
title_A_mission_name_M_unique_kill_protomolecule_spawner=[img=technology/msi_protomolecule_awaken]Zabij gniazdo zainfekowane protomolekułą
page_mission_name_M_unique_kill_protomolecule_spawner=Ta rzecz jest wysoce zakaźna i zanieczyszcza wszystko, czego dotknie! Pospiesz się! Musimy to wszystko spalić!!! Zabij zainfekowane gniazdo, zanim infekcja się rozprzestrzeni!

menu_mission_name_M_unique_msi_protomolecule_spawner_boss=[img=technology/msi_protomolecule_awaken]Zabij protomolekułę
menu_A_mission_name_M_unique_msi_protomolecule_spawner_boss=[img=technology/msi_protomolecule_awaken]Zabij protomolekułę
title_mission_name_M_unique_msi_protomolecule_spawner_boss=[img=technology/msi_protomolecule_awaken]Zabij gniazdo zainfekowane protomolekułą
title_A_mission_name_M_unique_msi_protomolecule_spawner_boss=[img=technology/msi_protomolecule_awaken]Zabij gniazdo zainfekowane protomolekułą
page_mission_name_M_unique_msi_protomolecule_spawner_boss=Zabiliśmy to? Tak? Nie? O nie! Wygląda na to, że ta rzecz właśnie wystrzeliła się w niebo! Zniknęła gdzie indziej. Spójrz! Tam jest. Ale wygląda na to, że jest teraz znacznie większa. Musimy ją zniszczyć za wszelką cenę! Ponownie! Do boju!!

menu_mission_name_M_research_msi_protomolecule_antidote_bomb=[img=technology/msi_protomolecule_antidote_bomb]Zbadaj odtrutkę
menu_A_mission_name_M_research_msi_protomolecule_antidote_bomb=[img=technology/msi_protomolecule_antidote_bomb]Zbadaj odtrutkę
title_mission_name_M_research_msi_protomolecule_antidote_bomb=[img=technology/msi_protomolecule_antidote_bomb]Zbadaj bombę z odtrutką
title_A_mission_name_M_research_msi_protomolecule_antidote_bomb=[img=technology/msi_protomolecule_antidote_bomb]Zbadaj bombę z odtrutką
page_mission_name_M_research_msi_protomolecule_antidote_bomb=Udało nam się zniszczyć ogromne gniazdo zainfekowane protomolekułą! To dobra wiadomość. Zła wiadomość jest taka, że infekcja rozprzestrzeniła się tak szybko, że teraz jest wszędzie! Musimy zbadać sposób walki z infekcją. Skoncentrujmy się więc na opracowaniu broni biologicznej, która na dobre wyeliminuje zagrożenie. Gdybyśmy mogli wystrzelić ją z bomby w atmosferze, trafiłaby wszystkie naraz. Musimy zbadać bombę z odtrutką na protomolekułę [img=item/msi_protomolecule_antidote_bomb] i wystrzelić ją na rakiecie!

menu_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]Wystrzel bombę z odtrutką
menu_A_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]Wystrzel bombę z odtrutką
title_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]Wystrzel bombę z odtrutką
title_A_mission_name_M_unique_launch_protomolecule_antidote_bomb=[img=item/msi_protomolecule_antidote_bomb]Wystrzel bombę z odtrutką
page_mission_name_M_unique_launch_protomolecule_antidote_bomb=Czas oczyścić planetę z protomolekuły! Musimy wypuścić bombę z odtrutką na protomolekułę do atmosfery. Opracowana przez nas broń biologiczna zniszczy całą aktywność protomolekuły na tej planecie. \n\nWystrzel bombę [img=item/msi_protomolecule_antidote_bomb] z naszego silosu rakietowego!


