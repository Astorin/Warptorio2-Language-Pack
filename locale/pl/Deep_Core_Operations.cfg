[space-location-description]
drg-biome-nauvis=Główna strefa wydobywcza i główny ośrodek operacyjny. Stosunkowo stabilny region podziemny z rozwiniętą infrastrukturą i drogami dostępu do głębszych warstw. Na obrzeżach występuje typowa dla tego środowiska wroga fauna. Chociaż nie ma tu żadnego dominującego surowca, można tu znaleźć wszystkie rzadkie minerały w niezwykle niewielkich stężeniach.
drg-biome-desert=Popękane, suche jaskinie, w których dominują kruche skały i głębokie szczeliny. Teren jest niestabilny, a podczas wykopalisk często spotyka się kłęby pyłu i zawalające się stropy. Pod powierzchnią czają się rodzime drapieżne pajęczaki, atakujące z ukrytych tuneli. W skałach można czasem znaleźć odsłonięte złoża fragmentów perlitowych, a także rzadsze ślady bloków ambrowych.
drg-biome-vulcanus=Niestabilna sieć tuneli ogrzewanych magmą, gdzie intensywne ciepło i ciśnienie kształtują środowisko. Rzeki stopionej skały oświetlają jaskinie, a aktywność sejsmiczna jest częsta. W tych głębinach żyją wybuchowe kąsacze, atakujące intruzów z niszczycielską siłą. Bogate żyły Ferronoxu są osadzone głęboko w najgorętszych strefach.
drg-biome-gleba=Gęsta roślinność podziemna opanowała te jaskinie, tworząc gęste systemy korzeniowe i bogate w minerały warstwy organiczne. Widoczność jest ograniczona przez bujną roślinność, a teren może się przesuwać pod wpływem ciśnienia. Obszar ten jest strzeżony przez Pięcionogów i Deptaczy, terytorialne i bardzo wytrzymałe stworzenia. Ten biom jest głównym źródłem bloków Amberium, tworzonych w matrycy organiczno-mineralnej.
drg-biome-aquilo=Zamarznięte tunele wykute w gęstym lodzie i kryształowych formacjach. Światło załamuje się na krystalicznych ścianach, ale ruch jest spowolniony przez ekstremalne zimno. Korytarzami tymi przemierzają Mroźne kąsacze, zdolne do zamrażania celów i maszyn. W warstwach lodu często można znaleźć duże złoża fragmentów perlitowych.
drg-biome-fulgora=Naładowane elektrycznie jaskinie, w których nieustannie wyładowują się łuki elektryczne. Powietrze szumi od wyładowań statycznych, a maszyny często ulegają zakłóceniom. Starożytne autonomiczne droidy patrolują te strefy – są to pozostałości po zaginionej cywilizacji, bardzo wytrzymałe i precyzyjne. Niestabilne pola energetyczne powodują powstawanie złóż spikitu, trzeszczącego zgromadzonym ładunkiem.
drg-biome-toxic=Zardzewiałe i toksyczne systemy tuneli wypełnione gęstymi kieszeniami gazu i reaktywnymi minerałami. Widoczność jest niska, a długotrwałe przebywanie w tym środowisku jest niebezpieczne. Żyją tu toksyczne kąsacze, które podczas walki uwalniają trujące chmury. Głównym surowcem jest radiantyt, lotny minerał, który emituje szkodliwą energię i zanieczyszcza otaczające obszary.


