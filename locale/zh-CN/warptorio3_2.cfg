[technology-description]
warptorio-mining-prod=跃迁技术使我们在采集资源时几乎能将其翻倍。
warptorio-axe-speed=改进将星球结构跃迁至你物品栏中的能力。
warptorio-bot-speed=允许机器人以几乎不可察觉的短距离跃迁，略微提升其速度。
warptorio-reach=跃迁反应堆事故赋予了你一种超自然能力，能够制造局部跃迁，提升你的触及距离。
warptorio-physdmg=跃迁技术为我们的武器和防御网络带来了小幅改进。
warptorio-accumulator=这些蓄电器在跃迁平台与所有跃迁蓄电器之间平衡电力，从而提高各平台楼层之间的能量吞吐量。
warptorio-teleporter-portal=解锁跃迁平台行星传送门。
warptorio-toolbar=掌握你对跃迁空间的先天控制力，使你能远程召回收割机和传送门。
warptorio-striders=跃迁反应堆事故赋予了你一种超自然能力，能够制造局部跃迁，提升你的移动速度。

warptorio-rail-nw=跃迁铁轨能探测经过的列车，并将其货物与跃迁工厂层上的箱子之间进行跃迁传输。
warptorio-rail-ne=跃迁铁轨能探测经过的列车，并将其货物与跃迁工厂层上的箱子之间进行跃迁传输。
warptorio-rail-sw=跃迁铁轨能探测经过的列车，并将其货物与跃迁工厂层上的箱子之间进行跃迁传输。
warptorio-rail-se=跃迁铁轨能探测经过的列车，并将其货物与跃迁工厂层上的箱子之间进行跃迁传输。

warptorio-turret-nw=通过跃迁工厂层在西北方向跃迁一座小型城堡炮塔。
