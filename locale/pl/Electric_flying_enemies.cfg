fe_resonance_shard=Ten artefakt, wykuty przez starożytną cywilizację, został zaprojektowany jako ostatnia linia obrony przed nieustannym natarciem autonomicznych maszyn wojennych.\nJego skomplikowana siatka kieruje egzotyczne wzorce energii, które zakłócają koordynację wrogich sztucznych inteligencji, uniemożliwiając im zakładanie nowych baz w zasięgu.

