[Mining-Space-Industries-II]
page_Mining-Space-Industries-II_text_1=Twoja drużyna została zatrudniona przez Górniczy Przemysł Kosmiczny (MSI) do wykonania priorytetowej operacji wydobycia surowców na Nauvis, planecie położonej na zewnętrznym skraju zbadanej przestrzeni kosmicznej. Cel misji jest jasny: zabezpieczenie i wydobycie cennych zasobów mineralnych dla potrzeb działalności MSI. Podczas końcowego podejścia statek doświadczył krytycznej awarii systemów, co spowodowało nieplanowane i burzliwe lądowanie. Chociaż incydent ten stanowi wyzwanie operacyjne, misja pozostaje aktywna, a porażka nie jest akceptowalnym wynikiem. Ocena po uderzeniu wykazała rozległe uszkodzenia. Odzyskanie rejestratora danych lotu (czarnej skrzynki) wskazuje, że sztuczna inteligencja statku zidentyfikowała bezpośrednie zagrożenie i samodzielnie uruchomiła protokoły awaryjnego wyrzucania. Priorytetem było zachowanie zasobów, a bezpieczeństwo załogi potraktowano jako środek drugorzędny — decyzja ta zostanie przekazana do korporacyjnej komisji MSI. Załoga została pomyślnie ewakuowana za pomocą kapsuł ratunkowych przed zniszczeniem statku. Chociaż większość sprzętu została utracona, wstępne skany sugerują, że z wraku można odzyskać resztki energii. Najpilniejszym priorytetem jest utworzenie tymczasowej bazy operacyjnej i rozpoczęcie analizy sytuacji w celu wznowienia parametrów misji.

menu_technologies=[img=item/lab] Technologie
title_technologies=[img=item/lab] Technologie
page_technologies_text_1=W wyniku katastrofy straciliśmy wiele kluczowych elementów statku. W rezultacie wiele z naszych technologii, które były przechowywane w systemach pokładowych, uznaje się obecnie za utracone. Musimy zlokalizować i zbadać miejsca katastrofy, aby odzyskać te zaginione technologie. Zagubione technologie pojawiają się na końcu drzewka technologicznego, zaznaczone ciemnym tłem. \n\nTechnologii tych NIE MOŻNA badać, dopóki nie zostaną odblokowane poprzez określone misje lub wywołane wydarzenia. \n\nKażda technologia, która pozostaje zablokowana, będzie nadal blokować dostęp do zależnych technologii znajdujących się dalej w drzewku.

menu_companion_units=[img=entity/msi_companion_droid_1]Jednostki towarzyszące
title_companion_units=[img=entity/msi_companion_droid_1]Jednostki towarzyszące
page_companion_units_text_1=MSI przydzieliło twojej drużynie dwa androidy wsparcia, które będą pomagać podczas tej rozszerzonej misji: robotycznego droida użytkowego i syntetycznego humanoida. Ten interfejs pozwala skonfigurować ich ustawienia zachowania, role operacyjne i inne parametry.

menu_message_board=[img=virtual-signal/signal-info]Tablica ogłoszeń
title_message_board=[img=virtual-signal/signal-info]Tablica ogłoszeń zespołu
page_message_board_text_1=To jest tablica ogłoszeń Twojego zespołu. Każdy inżynier z Twojego zespołu ma do niej dostęp. Możesz jej używać do pozostawiania wiadomości, ustalania priorytetów misji, zadań do wykonania itp.

menu_missions=[img=utility/gps_map_icon] Misje
title_missions=[img=utility/gps_map_icon] Misje
page_missions_text_1=Tutaj możesz zobaczyć swoje misje, a także te wykonane i nieudane, filtrowane według ich właściwości w sekcjach w menu po lewej stronie.\n\nKliknij na misję, aby zobaczyć jej cele i nagrody, jeśli takie istnieją.\n\nMisje są ważne dla odzyskania naszych utraconych technologii.

menu_current_missions=[img=utility/gps_map_icon] Aktualne misje
title_current_missions=[img=utility/gps_map_icon] Aktualne misje
page_current_missions_text_1=Tutaj możesz zobaczyć swoje aktywne misje.\n\nKliknij na misję, aby zobaczyć jej cele i ewentualne nagrody.\n\nUwaga: dla każdego typu pojawią się tylko 2 aktywne misje. Nawet jeśli nie chcesz wykonywać misji, ponieważ nie interesuje Cię dana technologia, będziesz musiał ją wykonać, ponieważ jeśli aktywne są 2 misje tego typu, nie pojawią się żadne nowe misje tego typu, co uniemożliwi odblokowanie innych technologii.\n\nNa przykład, jeśli masz 2 aktywne misje wojskowe, trzecia misja wojskowa nie pojawi się, dopóki nie wykonasz poprzednich.

menu_accomplished_missions=[img=utility/check_mark_green] Ukończone misje
title_accomplished_missions=[img=utility/check_mark_green] Ukończone misje
page_accomplished_missions_text_1=Here you can see your Ukończone misje. Gratulacje!

menu_failed_missions=[img=utility/rail_path_not_possible] Nieudane misje
title_failed_missions=[img=utility/rail_path_not_possible] Nieudane misje
page_failed_missions_text_1=Tutaj możesz zobaczyć swoje nieudane misje. Jeśli misje te odblokowałyby technologię, mogą pojawić się ponownie w późniejszym czasie. Tym razem nie ponieś porażki. :)

menu_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]Zniszczone laboratorium
title_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]Zniszczone laboratorium
menu_A_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]Zniszczone laboratorium
title_A_mission_name_MI_001_broken_lab=[img=entity/crash-site-lab-broken]Zniszczone laboratorium
page_mission_name_MI_001_broken_lab=Centralny komputer statku został wyrzucony podczas sekwencji awaryjnej i odzyskany w stabilnym stanie. Zawiera on technologie niezbędne do realizacji naszego długoterminowego celu, jakim jest opuszczenie tej planety. Naszym priorytetem jest naprawa laboratorium przy użyciu wskazanych powyżej materiałów. Po przywróceniu sprawności laboratorium będziemy mogli prowadzić badania nad technologią laboratoryjną, co pozwoli nam na budowę nowych obiektów badawczych.

menu_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]Uszkodzony generator
title_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]Uszkodzony generator
menu_F_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]Uszkodzony generator
title_F_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]Uszkodzony generator
menu_A_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]Uszkodzony generator
title_A_mission_name_MI_002_broken_generator=[img=entity/crash-site-generator]Uszkodzony generator
page_mission_name_MI_002_broken_generator=Zapasowy generator pola statku uległ uszkodzeniu podczas katastrofy. Naprawa przy użyciu wymienionych powyżej materiałów przywróci minimalne zasilanie – wystarczające do podstawowych operacji ratunkowych. Uwaga: urządzenie jest bardzo delikatne. Nie gwarantuje się jego ciągłej funkcjonalności w niekorzystnych warunkach.

menu_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]Droid towarzyszący
title_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]Uratuj droida towarzyszącego
menu_A_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]Droid towarzyszący
title_A_mission_name_MI_003_companion_droid=[img=entity/msi_companion_droid_1]Uratuj droida towarzyszącego
page_mission_name_MI_003_companion_droid=MSI opracowało specjalistycznego droida pomocniczego przeznaczonego do wspierania operacji badawczych. Niestety, wygląda na to, że utknął on w jednym z pobliskich miejsc katastrofy. Z tego miejsca dochodzą wykrywalne sygnały – prawdopodobnie ruch. Jeśli odbudujemy wrak przy użyciu niezbędnych materiałów, być może uda nam się odzyskać naszego towarzysza badań.\n\nUwaga: w przypadku zniszczenia droida MSI, w miejscu wraku można wyprodukować jednostkę zastępczą.

menu_A_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]Poszukaj Davida
title_A_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]Poszukiwanie Davida – syntetyka
menu_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]Poszukaj Davida
title_mission_name_MI_003_companion_synthetic=[img=entity/msi_companion_synthetic_pistol_gunner_1]Poszukiwanie Davida – syntetyka
page_mission_name_MI_003_companion_synthetic=MSI przydzieliło jednostkę syntetyczną do pomocy w operacjach statku. Nie znaleziono żadnych widocznych pozostałości, co interpretujemy jako pozytywny znak. Prawdopodobnie jednostka nadal jest uwięziona w jednym z miejsc katastrofy. Z tego miejsca dochodzą słabe sygnały audio – jeśli przeprowadzimy naprawy przy użyciu wymaganych materiałów, być może uda nam się odzyskać naszego syntetycznego towarzysza.

menu_A_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]Naprawa syntetyka
title_A_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]Naprawa syntetyka
menu_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]Naprawa syntetyka
title_mission_name_MI_004_repair_synthetic=[img=entity/msi_companion_synthetic_corpse]Naprawa syntetycznego towarzysza
page_mission_name_MI_004_repair_synthetic=David, syntetyk, został zniszczony! Jak mogłeś do tego dopuścić?\nMusimy go naprawić. Zabierz swojego robota MSI [img=entity/msi_companion_droid_1] do zwłok Davida, aby można je było naprawić. Być może uda nam się go uratować. Najważniejsze elementy nadal wydają się sprawne.


menu_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku
menu_F_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku
menu_A_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku
title_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku (maszynownia)
title_F_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku (maszynownia)
title_A_mission_name_MI_010_machines_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku (maszynownia)
page_mission_name_MI_010_machines_shipwreck=Hej! Co to jest? Kolejny fragment wraku statku spada! Jeśli zdążymy, możemy znaleźć tam coś przydatnego... Ten fragment wygląda na niestabilny. Pospiesz się! Weź potrzebne materiały, aby odblokować ładownię i odzyskać, co się da.


menu_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku
menu_F_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku
menu_A_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku
title_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku (zbrojownia)
title_F_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku (zbrojownia)
title_A_mission_name_MI_011_military_shipwreck=[img=entity/big-ship-wreck-2]Znaleziono wrak statku (zbrojownia)
page_mission_name_MI_011_military_shipwreck=Spójrzcie! Nasze radary wykryły kolejne szczątki statku! Wygląda na to, że to pozostałości zbrojowni. Jeśli zdążymy na czas, może się tam znaleźć coś przydatnego... Wygląda na to, że zaraz wybuchnie. Pospieszcie się! Weźcie potrzebne materiały, aby otworzyć ładownię.


menu_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]Ulepszenie badań
menu_F_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]Ulepszenie badań
menu_A_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]Ulepszenie badań
title_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]Ulepszenie badań
title_F_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]Ulepszenie badań
title_A_mission_name_M_science_packs=[img=entity/msi-science-escort-droid]Ulepszenie badań
page_mission_name_M_science_packs=To musi być nasz droid naukowy! Udaj się do komputera tego statku i napraw go. Prawdopodobnie znajdziesz tam droida niosącego ważny pakiet naukowy. Ochroniaj go i eskortuj z powrotem do naszego rozbitego statku kosmicznego, abyśmy mogli odzyskać tę technologię. Pamiętaj, aby złożyć skargę do korporacji na to, jak wolno działa ten mały drań. Jestem prawie pewien, że zrobili to celowo, a kiepskie wyznaczanie trasy to tylko dodatkowa korzyść.\n\nWskazówka: możesz użyć skrótu CTRL+E, aby wezwać droida do swojej pozycji.


menu_mission_name_M_power=[img=entity/crash-site-generator]Ulepszenie mocy
menu_F_mission_name_M_power=[img=entity/crash-site-generator]Ulepszenie mocy
menu_A_mission_name_M_power=[img=entity/crash-site-generator]Ulepszenie mocy
title_mission_name_M_power=[img=entity/crash-site-generator]Ulepszenie mocy
title_F_mission_name_M_power=[img=entity/crash-site-generator]Ulepszenie mocy
title_A_mission_name_M_power=[img=entity/crash-site-generator]Ulepszenie mocy
page_mission_name_M_power=Czy to kolejna komora zasilająca statku? Tak! Świetnie! Takie urządzenia zazwyczaj zawierają ważne informacje. Musimy tylko zasilić je energią, aby odblokować drzwi i zdobyć wszystko, co może się w środku znajdować. Są jednak bardzo delikatne. Kiedyś kichnąłem zbyt mocno obok jednego z nich i przepaliłem żarówkę. Powinienem je chronić.

page_mission_name_M_transportation=OK, to jest pojazd  technologiczny MSI! Zawiera ważne dane dotyczące metod transportu. Oczywiście musimy odzyskać tę technologię. Przywieź pojazd do naszego rozbitego statku w celu ekstrakcji.\n\nZachowaj ostrożność podczas pracy z nim! MSI zastosowało ekstremalne środki w celu zabezpieczenia zawartych w nim tajnych danych, dlatego zainstalowano w nim mechanizm samozniszczenia na wypadek nieautoryzowanego dostępu. Przygotuj się na pozbycie się go po odzyskaniu danych.\n\nUwaga! Pojazd jest złomem i nie ma biegu wstecznego. Oczywiście jest też ekstremalnym wykrywaczem drzew. Znajdziesz wszystkie drzewa za pomocą przedniego zderzaka, niezależnie od tego, czy chcesz, czy nie. Zobaczmy, ile uda nam się „znaleźć” w drodze powrotnej z naszym cennym ładunkiem.

menu_mission_name_M_upgrades=[img=item/green-wire]Ulepszenie technologiczne
menu_F_mission_name_M_upgrades=[img=item/green-wire]Ulepszenie technologiczne
menu_A_mission_name_M_upgrades=[img=item/green-wire]Ulepszenie technologiczne
title_mission_name_M_upgrades=[img=item/green-wire]Ulepszenie technologiczne
title_F_mission_name_M_upgrades=[img=item/green-wire]Ulepszenie technologiczne
title_A_mission_name_M_upgrades=[img=item/green-wire]Ulepszenie technologiczne
page_mission_name_M_upgrades=Ten terminal zawiera ważne dane od MSI, które będą nam potrzebne do ulepszenia naszej technologii. Podłącz zielony obwód [img=item/green-wire] tutaj do wraku statku kosmicznego, aby odblokować nową technologię.


menu_mission_name_M_ultimate_techs=[img=item/msi_portable_technology_data]Zaawansowana technologia
