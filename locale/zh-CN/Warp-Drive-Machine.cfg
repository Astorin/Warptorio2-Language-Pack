wdm_destroyed_terminal=你可以尝试使用 [item=green-wire] 将此飞船终端与你自己的终端连接以进行入侵。
wdm_terminal=这是主跃迁飞船终端，飞船电力存储于此。\n[color=yellow]点击此处查看更多选项。[/color]
wdm-linked-chest=允许在飞船楼层之间转移物品
