[item-description]

drg_beer_regen=Официально классифицируется как лечебный напиток. Неофициально классифицируется как промышленный растворитель. Со временем восстанавливает здоровье.
drg_beer_speed=Содержит достаточно стимуляторов, чтобы запустить десантную капсулу. Двигайся быстрее и опереди большинство своих ошибочных решений.
drg_beer_mining_bonus=Превращает обычных шахтёров в маньяков по добыче руды. Повышает эффективность добычи руды киркой. Копайте меньше — добывайте больше.
drg_beer_no_pain=Боль — это ценный предупреждающий сигнал. Это пиво полностью устраняет её. Получите повышенную сопротивляемость урону.
drg_beer_bonus_damage=Для гномов, которые верят, что любую проблему можно решить с помощью дополнительной огневой мощи. Увеличивает урон, наносимый врагам.
drg_beer_bonus_damage_no_pain=Рекомендуется принимать перед сражениями с боссами, экстренными эвакуациями и аттестациями. Увеличивает наносимый урон и снижает получаемый урон.

drg_flare_gun=Сигнальный пистолет освещает пещеры, а подсвеченные враги получают на 10% больше урона.
drg_mule_freezer=Когда экипировано в Муле, замедляет порчу предметов в багажнике.
drg_asteroid-collector=[color=#e597f0]Ограничение: можно построить только 1 штуку, пока не исследована [technology=rocket-silo].[/color]
drg_crusher=[color=#e597f0]Ограничение: можно построить только 1 штуку, пока не исследована [technology=rocket-silo].[/color]

drg_platform_linked_chest=Переносит предметы между внешней платформой и помещениями Space Rig. Ограничено по одному на каждый этаж платформы.
drg_platform_linked_chest_2=Переносит предметы между внешней платформой и помещениями Space Rig. Ограничено по одному на каждый этаж платформы.
drg_mule_fluid_collector=Жидкость, хранящаяся здесь, будет собираться Мулом, чтобы попасть на Space Rig при эвакуации
drg_storage_ship_pipe=Можно построить только на выделенной клетке на Space Rig
drg_seismic_charge=Вызывает мощный взрыв, наносящий 1500 единиц урона, разрушающий стены пещер и имеющий шанс обрушить вражеские норы.


