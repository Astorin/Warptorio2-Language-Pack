[planet-description]
cold_planet=一股冷风，脊背发凉。这就是你在那里的感受。
toxic=你的飞船进入了一个炎热而有毒的大气层。这里的辐射极高……
cold_eruptions=你感到地面在震动，不远处，你看到巨大的雪球猛烈地四处飞舞。风似乎非常狂暴！
frozen_riches=你放眼望去，到处都是冰。雪密得让你觉得最好待在飞船里靠近熔炉。但冰下有什么东西在闪光……
exotic_beach=你降落在美丽异域的海滩上。这些虫子在这天堂里过着好日子。
rest_beach=你降落在美丽异域的海滩上。欣赏美景，稍作休息。
exotic_islands=这些岛屿似乎等待了许久才迎来访客。欢迎来到异域蓝岛世界。
infested_riches=你到处看到火山矿物。但这颗星球虫害严重。我们最好尽快开采一些财富然后撤离！
blue_moon=你抵达这片蓝色富饶的月壤。但你看到到处都是原住民。我们最好快速开采然后离开！
atoll=你的飞船降落在美丽的环礁上。环顾四周，你注意到所有这些湖泊都是在火山口上形成的，而较高的边缘仍在水面之上。
extreme_planet=一颗气候极端的星球！从窗口望去，沙漠和森林、冰封湖泊和炙热火山岩，都在仅几英亩的距离内。
desert=你看到广袤炎热的沙漠。附近似乎没有水源。
hot_planet=像地狱一样热！你在想这些虫子怎么可能在这里生存，感到困惑。
volcanic=你看到大气中浓密的红烟。到处温度极高。一块巨大的热岩石！
hot_mixed_ores=当你看窗外时，你看到丰富而未探索的环境。但我们带矿石分拣机了吗？
salty_planet=这个多山的世界让你猜测这个咸水星球究竟是如何存在的。
purple_forest=为什么这么紫？从窗口你看到许多湖泊，被湿润而茂密的紫色森林环绕。
exotic_forest=一个色彩鲜艳的美丽星球！从窗口你看到湿润的土壤和茂密的森林。你觉得你可以住在这里。
green_rock=这块巨大的绿色岩石让你怀疑那些绿色小径可能有毒……

