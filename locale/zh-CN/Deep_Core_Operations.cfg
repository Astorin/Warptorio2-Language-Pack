drg_beer_regen=官方分类为药用饮料，非官方分类为工业溶剂。随时间恢复生命值。
drg_beer_speed=含有足够驱动空降舱启动的兴奋剂。移动更快，让你摆脱大多数糟糕的决定。
drg_beer_mining_bonus=让普通矿工变成碎矿狂人。提高矿镐的采矿效率。挖得更少，采得更多。
drg_beer_no_pain=疼痛是宝贵的预警信号，这瓶啤酒能完全消除疼痛。获得更高的伤害抗性。
drg_beer_bonus_damage=献给那些认为所有问题都能用更多火力解决的人。提高对敌人造成的伤害。
drg_beer_bonus_damage_no_pain=推荐在首领战、紧急撤离和绩效评估前饮用。提高伤害输出，同时减轻受到的伤害。

drg_flare_gun=信号枪可照亮洞穴，被照亮的敌人在受到攻击时承受的伤害提高10%。
drg_mule_freezer=装备在骡子上时，可减缓其储物箱内物品的腐烂速度。
