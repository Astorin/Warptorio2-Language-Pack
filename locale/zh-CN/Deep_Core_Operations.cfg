drg_supply_chest=此处储存的物品可通过远程控制从太空钻机发送到地下任务中。
drg_mule_fluid_collector=此处储存的流体将被骡子收集，并在撤离时带回太空钻机。
drg_driller_machine=这台钻探机需要[item=coal]煤炭才能运行。携带煤炭并停留在其工作区域附近。注意：玩家不能挖掘到钻机前面。
drg_mission_terminal=控制任务选择和空降舱发射准备。连接到平台枢纽网络。
drg_mule_chest=交付储存在太空钻机中的资源，这些资源由骡子在地下采矿作业期间收集。点击以访问太空钻机储备。
drg_orbital_fluid_uplink=此机器允许将洞穴中的流体（[fluid=water][fluid=crude-oil][fluid=ammoniacal-solution][fluid=lithium-brine][fluid=fluorine]）泵送至太空钻机。每次科技升级可解锁一种额外的流体并提高传输速率。每个洞穴任务只允许建造一台此机器。 
drg_energy_receiver=从太空钻机平台接收电力。传输系统的数量受科技升级限制。



