[technology-description]
drg_fluid_mining=Allows to use fluids to mine minerals when required
drg_freeze_chest=Slows down spoiling
drg_seismic_charge=A heavy bomb that causes area damage and dig holes!
drg_molly_upgrade=Upgrade the Mule for more resistances, HP, inventory and equipment space. Each level also raises the bonus for collected ores by 10%.
drg_energy_receiver=Allows to receive power from the Space Rig platform. The number of simultaneous power uplinks is limited by research upgrades.
drg_energy_receiver_extra_links=Increases the simultaneous power uplinks.
drg_tech_toxic_mask=Allows to build the toxic mask, which protects the wearer from toxic gases. Essential equipment for survival in the toxic caves of [img=space-location/drg-biome-toxic]Toxfract Veins and [img=space-location/drg-biome-gleba]Verdant Vein Cluster.
drg_tech_license_lightning_rod=Allows to build lightning rods
drg_tech_unlock_biome_gleba=Unlocks the [img=space-location/drg-biome-gleba]Verdant Vein Cluster for exploration.
drg_tech_unlock_biome_aquilo=Unlocks the [img=space-location/drg-biome-aquilo]Crystalline Channels for exploration.

drg_supply_capsule=Allow the crew underground to call a reinforcement capsule to drop supplies from the Space Rig. Each core technology level increases the amount of calls per mission.
drg_platform_linked_chest_2=Allows to build another platform linked chest to transfers items between the external platform and the Space Rig interior
drg_ship_fluid_storage=Allows the ship to storage fluid tank. Each technology level increases 50k liters of fluid storage capacity.
drg_Mule_upgrade=Upgrade for Mule. Each level increases its HP, storage capacity and equipment grid.
drg_ship_resource_storage=Adds mores space on the Space Rig to storage resources. Each technology level increases the capacity.
drg_mule_fluid_collect=Allows Mule to collect fluids stored in [entity=drg_mule_fluid_collector]. If successfully extracted, fluids are stored internally in the SpaceRig
drg_orbital_fluid_uplink=This machine allows fluids to be pumped from caves to the Space Rig, via uplink. To establish a continuous flow, fill the machine with the desired fluid from a cave. Once fully filled, leave it in the cavern. If the mission is successfully completed and extraction is achieved, the machine will continue pumping fluid to the Space Rig as long as it remains in that region (biome). Only one machine per cave is allowed.

drg_drill_cannon=A portable drilling cannon designed for hostile underground environments. When equipped, it fires impact charges with rotating drill tips, capable of breaking rocks quickly and opening passages in deep caves. Essential for engineers who must advance under pressure and avoid getting trapped.
drg_ship_floors_tech=Unlocks a new spaceship floor, accessible through the elevator.

drg_ship_platform_camera=Spaceship ability: enables activation of the platform camera, so you can see what is going on out there.
wdm-linked-chest=Allows to transfer items between spaceship floors
drg_ship_pipe=Allows fluid transfer between Space Rig floors using linked pipe connections. Each level increases the number of pipes that can be placed per floor

drg_enemy_evolution_tracker=Allows to track enemy evolution. It is shown on mission control panel, so you can keep an eye on how the enemies are evolving in that region
drg_contract_tasks=Grants permission to accept contracts from the Galactic Mining Company
drg_tech_mule_containment_chamber=A place for Mule
drg_tech_mission_terminal=Unlocks the dropping bay and mission terminal in the Space Rig, allowing you to start accepting missions and drop into caves.
drg_tech_heat_shield=Allows to travel to extreme high temperature regions on the planet

