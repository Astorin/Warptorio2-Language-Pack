page_mission_name_M_production=Znaleźliśmy kolejny fragment wraku. Udaj się do tej zepsutej maszyny, napraw ją, a następnie uruchom, abyśmy mogli zainicjować protokoły odzyskiwania w nadziei na odblokowanie nowej technologii.

