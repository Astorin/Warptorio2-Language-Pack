
drg_intro_message=Ваш экипаж приближался к раздробленному миру [img=drg_planet]Фракта Мантис C — разрушенной планете, которую компания "Deep Core Operations" считала богатой ценными ресурсами для космической добычи. Во время выхода на орбиту космическая платформа "Space Rig" столкнулась с одним из огромных обломков планеты. Повреждения оказались критическими. [item=thruster]Ускорители были выведены из строя, а значительные участки конструкции оказались разрушены. Ваш экипаж теперь заперт в небольшом грузовом отсеке, отрезанном от жизненно важных систем корабля. Большая часть лежит в руинах.\nЕдинственное, что осталось в рабочем состоянии, — это небольшой терминал. С его помощью вы обнаруживаете, что всё ещё можете управлять внешними механическими манипуляторами корабля. Возможно, управляя ими, вы сможете собрать необходимые ресурсы с орбиты и начать ремонт самых критических повреждений — достаточно, чтобы восстановить работоспособную диспетчерскую. Повреждённый, но уцелевший переходный канал по-прежнему соединяет внешнюю часть с вашим отсеком, позволяя перемещать материалы внутрь и наружу. Нажмите [img=drg_elevator], чтобы выйти на внешнюю платформу и взять под контроль механические манипуляторы.

