[entity-description]
warptorio-warploader=根据过滤器在所有其他跃迁装载机之间分配物品。
warptorio-reactor=跃迁反应堆是一项失败的实验。它的输出功率很弱，而且它似乎更多地是在把自己拉入一个跨次元裂隙，而不是从中汲取能量。它也不稳定，如果不加以管理，它将摧毁所在星球，所以试着建造火箭离开吧！
