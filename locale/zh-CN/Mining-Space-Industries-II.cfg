page_mission_name_M_unique_boss_maf-worm-boss-fire-shooter=我开始喜欢这颗星球了，虽然花了一点时间适应，但我觉得我们现在处境不错。美好而宁静……\n\n哦。我的上帝。那是一个巨大的火球正朝我们冲来吗！？救救我们！我们正在遭到攻击！\n\n我们的雷达检测到攻击来自一只巨大的喷火蠕虫，给我的薪水绝对不足以应付这个。我们需要动员所有力量，尽快杀死那只蠕虫，消除威胁！

menu_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]巨型烟雾巢穴
menu_A_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]巨型烟雾巢穴
title_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]巨型烟雾巢穴
title_A_mission_name_M_unique_boss_msi-smoke-boss-spawner=[img=entity/msi-smoke-boss-spawner]巨型烟雾巢穴
page_mission_name_M_unique_boss_msi-smoke-boss-spawner=天色开始以惊人的速度变暗。我应该做些测试，确认这对于这颗星球来说是否正常。\n\n这些结果毫无意义。看起来天变暗是因为生物烟雾的增加。烟雾怎么可能是生物性的？照此下去，整颗星球将被烟雾笼罩，使我们陷入彻底的黑暗！\n\n进一步的测试得出结论，那些外星生物正在进化，它们这样做是为了在黑暗中攻击我们并损坏我们的机器。我们发现所有这些烟雾的源头是一个巨大的生物，它正在排放浓密的黑烟，覆盖了大气层。\n\n我们需要消灭这些排放的源头！这可能不太政治正确，但我们必须尽快摧毁那个该死的怪物。

